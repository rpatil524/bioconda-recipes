{% set name = "bullseye" %}
{% set version = "1.0.0" %}
{% set sha256 = "61e9fd0d13877a8ab7bb00299ca1a9ad037975b1327b1e8634099311827f5027" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/mflamand/Bullseye/archive/refs/tags/{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: generic
  run_exports:
   - {{ pin_subpackage('bullseye', max_pin="x") }}


requirements:
 host:
    - perl
 run:
    - perl
    - perl-bioperl
    - htslib
    - samtools
    - bedtools
    - perl-text-nsp
    - perl-mce
    - perl-array-intspan
    - perl-bio-db-hts
    - perl-math-cdf

test:
  commands:
    - parseBAM.pl --help
    - Find_edit_sites.pl --help
about:
  home: "https://github.com/mflamand/Bullseye"
  license: MIT
  license_family: MIT
  summary: "An Analysis pipeline for DART-seq, scDART-seq, TRIBE, STAMP and TRIBE-STAMP. Bullseye contains a set of perl scripts for parsing BAM files and identifying RNA editing sites."
  dev_url: "https://github.com/mflamand/Bullseye"

