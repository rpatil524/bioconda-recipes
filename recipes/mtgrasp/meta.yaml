{% set version = "1.1.10" %}
{% set name = "mtGrasp" %}

package:
  name: {{ name | lower }}
  version: {{ version }}

source:
  url: https://github.com/BirolLab/{{ name }}/releases/download/v{{ version }}/{{ name }}-v{{ version }}.tar.gz
  sha256: b6eaee48c0a202e63c077e7c727916d6f41bb8f84a35869abe79f517592305c5 

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('mtgrasp', max_pin="x") }}

requirements:
  host:
    - python <=3.12 # Needed to avoid version conflict errors in CI 
  run:
    - python <=3.12 # Needed to avoid version conflict errors in CI
    - snakemake
    - blast >=2.9.0
    - biopython
    - seqtk
    - abyss
    - ntjoin
    - bwa
    - samtools
    - pilon
    - ntcard
    - mitos >=2.1.7


test:
  commands:
    - mtgrasp.py -h

about:
  home: https://github.com/BirolLab/mtGrasp
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: 'reference-grade de novo animal mitochondrial genome assembly and standardization'
