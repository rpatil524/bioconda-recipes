{% set name = "selexprep" %}
{% set version = "0.3.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 45073103f3466c048c0112a67f6872b9522940dd63617beb8c2f10c9ffc7b6b5

build:
  noarch: python
  number: 0
  run_exports:
    - {{ pin_subpackage("selexprep", max_pin="x.x") }}
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.10
    - hatchling >=1.26
    - pip
  run:
    - python >=3.10
    - typer >=0.12
    - numpy >=1.24
    - pandas >=2.0
    - pyarrow >=14.0
    - pyyaml >=6.0
    - requests >=2.31
    - matplotlib-base >=3.8
    - pydantic >=2.0
    - cutadapt >=4.0
    - dnaio >=1.2

test:
  imports:
    - selexprep
  commands:
    - selexprep --help

about:
  home: https://github.com/marcorotanegroni/selexprep
  summary: Accession-first preprocessing for public HT-SELEX with primer auto-inference
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: https://github.com/marcorotanegroni/selexprep

extra:
  recipe-maintainers:
    - marcorotanegroni
