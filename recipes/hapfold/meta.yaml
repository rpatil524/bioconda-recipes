{% set version = "0.2.0" %}

package:
  name: hapfold
  version: {{ version }}

source:
  url: https://github.com/LuoGroup2023/HapFold/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 898f81ca452fa2954bed369b1dfa763b522ba721ef998bc71cd695b760827004
build:
  number: 1
  skip: True # [osx]
  run_exports:
    - {{ pin_subpackage('hapfold', max_pin="x.x") }}
requirements:
  build:
    - make
    - {{ compiler('cxx') }}
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - zlib
  run:
    - zlib
test:
  commands:
    - HapFold 2>&1 | grep 'Usage'

about:
  home: https://github.com/LuoGroup2023/HapFold
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'Efficient and Accurate Chromosome-Scale Haplotype Reconstruction.'
  dev_url: https://github.com/LuoGroup2023/HapFold
  doc_url: https://github.com/LuoGroup2023/HapFold

