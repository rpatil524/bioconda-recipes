package:
  name: perl-tree-dag_node
  version: "1.37"

source:
  url: https://cpan.metacpan.org/authors/id/R/RS/RSAVAGE/Tree-DAG_Node-1.37.tgz
  sha256: 711f39f0afd91b75ca5161d46dbafaf186023030061be8735f0b22b95efdd5e1

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage('perl-tree-dag_node', max_pin="x") }}

requirements:
