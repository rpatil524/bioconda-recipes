    - perl
    - perl-extutils-makemaker >=7.7
    - perl-file-slurper >=0.014

test:
  # Perl 'use' tests
  imports:
    - Tree::DAG_Node

about:
  home: http://metacpan.org/pod/Tree-DAG_Node
  license: artistic_2
  summary: 'An N-ary tree.'
