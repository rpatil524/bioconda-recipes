{% set name = "strdust" %}
{% set version = "0.20.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/wdecoster/STRdust/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 3afef9d78952667f04a9cfac57d5c48801a4e0a17d368b44dd59c06f01a99146

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - clangdev <22 
    - make
    - cmake
    - autoconf
    - automake
    - libtool
    - pkg-config
    - cargo-bundle-licenses
  host:
    - zlib
    - htslib

test:
  commands:
    - STRdust --help

about:
  home: "https://github.com/wdecoster/STRdust"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Tandem repeat genotyper for long reads."
  dev_url: "https://github.com/wdecoster/STRdust"
  doc_url: "https://github.com/wdecoster/STRdust/blob/v{{ version }}/README.md"

extra:
  additional-platforms:
    - osx-arm64
    - linux-aarch64
  identifiers:
    - doi:10.1101/gr.279265.124
  skip-lints:
    - compiler_needs_stdlib_c
