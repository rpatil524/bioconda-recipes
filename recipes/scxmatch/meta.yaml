{% set name = "scxmatch" %}
{% set version = "1.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/bionetslab/{{ name }}/releases/download/{{ name }}-{{ version }}/{{ name }}-{{ version }}.tar.gz
  sha256: b5df0f2e09025136f3111659797c2599c0288820c5ebd40c6167242716eb60c6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - python >=3.10
  host:
    - python >=3.10
    - hatchling
    - pip
  run:
    - python >=3.10
    - anndata >=0.10.9
    - scanpy >=1.10.3,<2
    - scipy >=1.13.1,<2
    - graph-tool >=2.92,<3


test:
  imports:
    - scxmatch


about:
  summary: Python implementation for single-cell cross match test, an efficient implementation of Rosenbaum's test.
  license: MIT
  license_file: LICENSE
  home: https://github.com/bionetslab/scxmatch

extra:
  recipe-maintainers:
    - annmoel
