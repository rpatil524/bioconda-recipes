{% set version = "0.3.0" %}
{% set name = "delve-bio" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/berndbohmeier/delve/archive/v{{ version }}.tar.gz
  sha256: 7f8a34bbdecc09200af60324885b79b15affedc94c856a3114544f160b79272a

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('delve-bio', max_pin="x.x") }}
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - cargo install -v --locked --no-track --root $PREFIX --path .

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }} # To build hts-sys
    - {{ stdlib('c') }} # Requested by linter if a compiler is used
    - cargo-bundle-licenses
    - clangdev <22 # old bindgen version of hts-sys does not support clang 22 yet
    # - {{ compiler('cxx') }}

test:
  commands:
    - delve --version

about:
  home: https://github.com/berndbohmeier/delve
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: A variant caller for mixed infections

extra:
  recipe-maintainers:
    - berndbohmeier
    - JasonAHendry
  additional-platforms:
    - linux-aarch64
    - osx-arm64
