
{% set name = "multi-omics-classification" %}
{% set version = "0.1.4" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/renu-pal/MultiClassPrediction/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 17fb59683ea7f0a53fddcd1b42f63148e56dacb5658d37bc614db7cdf7e0e5b2

  

build:
  noarch: python
  number: 0
  script:
    - python -m pip install . --no-deps -vv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python 
    - pip
    - setuptools
    - wheel
  run:
    - python
    - numpy
    - pandas
    - scikit-learn
    - matplotlib-base
    - seaborn
    - imbalanced-learn
    - lightgbm
    - xgboost
    - pip
    - tabpfn

test:
  imports:
    - multiclasspredict
    
  commands:
    - multiclasspredict --help

about:
  home: https://github.com/renu-pal/MultiClassPrediction
  summary: "A FAIR Machine Learning Framework for Benchmarking, Feature Selection, and Hyperparameter Optimization of machine learning Models for Multiomics Data in Galaxy"
  license: MIT
 

extra:
  recipe-maintainers:
    - renu-pal
