{% set version = "1.0" %}
{% set beta_suffix = "" %}
{% set sha256 = "333e4d76979aa281a35dd611a84645392d2f18dd7c8928a6d9fb76b848d50442" %}

package:
  name: hmftools-qsee
  version: '{{ version }}'

source:
  url: https://github.com/hartwigmedical/hmftools/releases/download/qsee-v{{ version }}/qsee_v{{ version }}{{ beta_suffix }}.jar
  sha256: '{{ sha256 }}'

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage('hmftools-qsee', max_pin="x") }}

requirements:
  run:
    - zlib
    - openjdk >=8,<=21
    - r-dplyr
    - r-ggplot2
    - r-patchwork
    - r-scales

test:
  commands:
    - 'qsee -version'

about:
  home: https://github.com/hartwigmedical/hmftools/tree/master/qsee
  license: GPL-3.0-only
  license_family: GPL3
  summary: Qsee collects, calculates, and visualises QC metrics from Hartwig pipeline outputs
