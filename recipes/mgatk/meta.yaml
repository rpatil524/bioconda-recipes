{% set name = "mgatk" %}
{% set version = "0.9.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/mgatk-{{ version }}.tar.gz
  sha256: 59753127462ec3b2141a70eea81afd03cb5415abddfb29894ae651576b12ec8b

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  run_exports:
    - {{ pin_subpackage('mgatk', max_pin="x.x") }}

requirements:
  host:
    - python >=3
    - pip
    - setuptools
  run:
    - python >=3
    - click
    - pysam
    - pytest
    - snakemake-minimal <8
    - pulp <2.8
    - biopython
    - numpy
    - pandas
    - optparse-pretty
    - regex
    - ruamel.yaml 0.16.12
    - openjdk
    - picard-slim
    - r-base
    - r-dplyr
    - r-data.table
    - r-matrix
    - bioconductor-genomicranges
    - bioconductor-summarizedexperiment

test:
  imports:
    - mgatk
  commands:
    - mgatk --help
    - mgatk-del-find --help
    - mgatk-del --help

about:
  home: https://github.com/caleblareau/mgatk
  summary: Mitochondrial genome analysis toolkit.
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  doc_url: https://github.com/caleblareau/mgatk/wiki

extra:
  recipe-maintainers:
    - mencian
