{% set version = "0.7.10" %}
{% set github = "https://github.com/acidgenomics/r-goalie" %}

package:
  name: r-goalie
  version: "{{ version }}"

source:
  url: "{{ github }}/archive/v{{ version }}.tar.gz"
  sha256: 2bf03a0208744d447ee7a9549fe195aceb518f69f4b9559e526eb9b6d94a5fd7

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('r-goalie', max_pin="x.x") }}

requirements:
  host:
    - r-base
  run:
    - r-base

test:
  commands:
    - $R -e "library('goalie')"

about:
  home: https://r.acidgenomics.com/packages/goalie/
  dev_url: "{{ github }}"
  license: Apache-2.0
  license_file: LICENSE.md
  license_family: APACHE
  summary: Assertive check functions for defensive R programming.

extra:
  recipe-maintainers:
    - acidgenomics
    - mjsteinbaugh
