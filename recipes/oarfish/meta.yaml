{% set version = "0.10.1" %}

package:
  name: oarfish
  version: {{ version }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("oarfish", max_pin="x.x") }}
    
source:
  url: https://github.com/COMBINE-lab/oarfish/archive/v{{ version }}.tar.gz
  sha256: b7d3dc76c032ffddf073254fa200c0282476852514845d46e0109bcdb038a145

requirements:
  build:
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - zlib
  run:
    - zlib

test:
  commands:
    - oarfish --help

about:
  home: https://github.com/COMBINE-lab/oarfish
  license: BSD-3-Clause
  license_file: LICENSE
  summary: oarfish is a tool for fast, accurate and versatile transcript quantification from long-read RNA-seq data

extra:
  skip-lints: 
    - compiler_needs_stdlib_c
  additional-platforms:
    - linux-aarch64
    - osx-arm64
