{% set name = "spice" %}
{% set version = "0.1.0" %}

package:
  name: '{{ name|lower }}'
  version: '{{ version }}'

source:
  url: https://github.com/zaccaria-lab/SPICE/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 07162766df6915aa238afcf9fe851780a6d977150c75998c27eb5d51a6b0e0c2

build:
  noarch: python
  number: 0
  entry_points:
    - spice = spice.sh.spice:main
  script: |
    set -ex
    {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  run_exports:
    - {{ pin_subpackage(name, max_pin='x.x') }}

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
  run:
    - python >=3.9
    - numpy >=1.22.0,<2.0.0
    - pandas >=2.0.0
    - scipy >=1.10.0,<2.0.0
    - pyomo >=6.7.0
    - biopython >=1.80
    - matplotlib-base >=3.7.0
    - seaborn >=0.13.0
    # NOTE: SPICE also requires the Gurobi solver at runtime (it uses a
    # Gurobi-specific feature not available in free solvers). Gurobi is
    # distributed via its own 'gurobi' channel, which is outside the
    # conda-forge/bioconda set that this recipe is built against, so it is NOT
    # listed as a run requirement. Users install it alongside SPICE, e.g.:
    #   conda create -n spice -c conda-forge -c bioconda -c gurobi spice gurobi
    # A valid Gurobi license (free for academics) is required via GRB_LICENSE_FILE.

test:
  imports:
    - spice
    - spice.core
    - spice.sh
    - spice.plotting
    - spice.postprocess
  commands:
    - spice -h

about:
  home: https://github.com/zaccaria-lab/SPICE
  summary: Subclone Probability Inference of Copy-number Evolution (SPICE)
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  dev_url: https://github.com/zaccaria-lab/SPICE
  doc_url: https://github.com/zaccaria-lab/SPICE/blob/v{{ version }}/README.md
  description: SPICE is an algorithm that reconstructs hundreds to thousands of equally plausible copy-number alteration (CNA) phylogenies for each tumour, taking as input clone-specific CNA profiles inferred from either bulk DNA sequencing data using copy-number deconvolution methods or from single-cell DNA sequencing data by clustering cells with similar CNAs. Rather than relying on a single, error-prone estimate, SPICE enumerates multiple equally-plausible CNA phylogenies to quantify uncertainty for each inferred CNA event.
