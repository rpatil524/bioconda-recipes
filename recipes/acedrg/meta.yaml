{% set version = "331" %}

package:
  name: acedrg
  version: {{ version }}

source:
  url: https://ccp4forge.rc-harwell.ac.uk/ccp4/acedrg/-/archive/{{ version }}/acedrg-{{ version }}.tar.gz
  sha256: 609129bbad39576ac062715ccac7288dbdba2f50454abeb011ddc7af0e45a2d0

build:
  number: 0
  run_exports: {{ pin_subpackage("acedrg", exact=True) }}
  # Due to CI time limit (60 min)
  skip: True  # [(linux and aarch64) and py <= 310]

requirements:
  build:
    - {{ compiler("cxx") }}
    - {{ stdlib("c") }}
    - cmake
    - grep  # [osx]
    - ninja
    - pkg-config
    - sed  # [osx]
  host:
    - python {{ python }}
  run:
    - gemmi
    - networkx
    - numpy
    - python {{ python }}
    - rdkit
    - servalcat
    - pdbecif
  run_constrained:
    - metalcoordanalysis >=0.2.13  # optional: required only for --metalPDB option

test:
  files:
    - ligand.smi

about:
  home: https://www2.mrc-lmb.cam.ac.uk/groups/murshudov/content/acedrg/acedrg.html
  dev_url: https://ccp4forge.rc-harwell.ac.uk/ccp4/acedrg
  doc_url: https://www2.mrc-lmb.cam.ac.uk/groups/murshudov/content/acedrg/acedrg.html
  license: MPL-2.0
  license_family: MOZILLA
  license_file: LICENSE
  summary: "ACEDRG: ligand/monosaccharide building and restraint generation tools from CCP4"
  description: |
    ACEDRG is a tool for generating ligand and monosaccharide coordinates and
    restraint dictionaries for macromolecular crystallography. It is part of the
    Collaborative Computational Project Number 4 (CCP4) software suite.

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - doi:10.1107/S2059798317000067
  recipe-maintainers:
    - eunos-1128
