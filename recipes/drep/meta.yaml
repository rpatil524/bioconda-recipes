{% set name = "drep" %}
{% set version = "4.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/d/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 16d4d8f2f1970581a687d1f81dd68aa4d01555a22606acf0e0bf3bb638bff39d

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install --no-deps --no-build-isolation --no-cache-dir . -vvv
  run_exports:
    - {{ pin_subpackage('drep', max_pin="x") }}

requirements:
  host:
    - python >=3
    - pip
    - setuptools
  run:
    - python >=3
    - numpy
    - pandas
    - seaborn-base
    - matplotlib-base
    - biopython
    - scikit-learn
    - tqdm
    - pytest
    - networkx
    - mummer4
    - mash
    - prodigal
    - fastani
    - checkm-genome
    - skani

test:
  imports:
    - drep
  commands:
    - dRep -h

about:
  home: "https://github.com/MrOlm/drep"
  license: MIT
  license_family: MIT
  summary: "De-replication of microbial genomes assembled from multiple samples."
  doc_url: "https://drep.readthedocs.io/en/latest"
  dev_url: "https://github.com/MrOlm/drep"

extra:
  identifiers:
    - biotools:drep
    - usegalaxy-eu:drep_compare
    - usegalaxy-eu:drep_dereplicate
    - doi:10.1038/ismej.2017.126
