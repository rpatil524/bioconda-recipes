{% set name = "NetSyn" %}
{% set version = "1.0.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/labgem/{{ name|lower }}/archive/v{{ version }}.tar.gz
  sha256: d3ba0770e21e1c3b4f71263d72d82c68a953497c41b9b85bb08ff7ec4aeab9b1

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install --no-deps --ignore-installed -vv .
  run_exports:
    - {{ pin_subpackage(name|lower, max_pin="x") }}


requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python >=3.8
    - mmseqs2 >=9.d36de
    - pyyaml
    - python-igraph
    - jsonschema
    - networkx >=2.8
    - urllib3
    - biopython
    - markov_clustering
    - requests

test:
  imports:
    - netsyn
  commands:
    - netsyn -h
    - netsyn_getINSDCFiles -h
    - netsyn_parseINSDCFiles_GetTaxonomy -h
    - netsyn_clusteringIntoFamilies -h
    - netsyn_syntenyFinder -h
    - netsyn_dataExport -h

about:
  home: https://github.com/labgem/{{ name|lower }}
  license: "CeCiLL-2.1"
  license_family: OTHER
  license_file: LICENSE.txt
  summary: NetSyn is a tool to detect conserved genomic contexts (i.e. synteny conservation) among a list of protein targets.
