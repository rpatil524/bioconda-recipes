{% set name = "enzywizard-conservation" %}
{% set version = "1.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/bioinfbrad/enzywizard-conservation/archive/refs/tags/{{ version }}.tar.gz
  sha256: 5144f29e9051e31abd0fcfc7d37a0efdb1b8f3cfd17ac5d645dfd11602b9344f

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation"
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >={{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - hmmer
    - biopython
    - numpy
    - packaging

test:
  imports:
    - enzywizard_conservation
    - enzywizard_conservation.cli
    - enzywizard_conservation.services.conservation_service
    - enzywizard_conservation.algorithms.conservation_algorithms
  commands:
    - enzywizard-conservation --help
    - hmmbuild -h
  # Note: A full test would require a query FASTA + MSA file (Stockholm/FASTA/A3M).
  # The tool internally calls hmmbuild to generate the profile HMM.

about:
  home: https://github.com/bioinfbrad/enzywizard-conservation
  summary: "Command-line tool to compute residue-level sequence conservation from a query sequence and MSA using HMMER profile HMMs, outputting cleaned MSA, HMM profile, and JSON report."
  description: |
    EnzyWizard-Conservation calculates per-residue conservation scores using a profile
    Hidden Markov Model (HMM) built with HMMER from a user-provided multiple sequence
    alignment (MSA). It supports Stockholm, aligned FASTA, and A3M formats.
    Outputs include a cleaned Stockholm MSA, the HMM profile, and a detailed JSON
    conservation report with raw scores, normalized emission probabilities, and
    Shannon information content.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - khaled196
    - Mingkai14
