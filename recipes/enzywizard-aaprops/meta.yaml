{% set name = "enzywizard-aaprops" %}
{% set version = "1.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/bioinfbrad/enzywizard-aaprops/archive/refs/tags/{{ version }}.tar.gz
  sha256: 9062692932576cc2cd9022c66309c46ba4dc587da86d03ca427570d65d83f250

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation"
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >={{ python_min }}
    - pip
    - setuptools
    - setuptools-git-versioning >=2.0,<3
  run:
    - python >={{ python_min }}
    - dssp
    - biopython
    - numpy

test:
  imports:
    - enzywizard_aaprops
    - enzywizard_aaprops.cli
    - enzywizard_aaprops.services.aaprops_service
    - enzywizard_aaprops.algorithms.aaprops_algorithms
  commands:
    - enzywizard-aaprops --help
  # Note: Requires the `dssp` executable (used via Biopython's DSSP parser) for secondary structure and solvent accessibility.

about:
  home: https://github.com/bioinfbrad/enzywizard-aaprops
  summary: "Command-line tool to compute per-residue amino acid properties (secondary structure via DSSP, solvent accessibility, torsion angles, physicochemical properties) from a cleaned protein structure and output a detailed JSON report."
  description: |
    EnzyWizard-AAprops extracts detailed structural and physicochemical properties for each
    residue in a cleaned protein structure (CIF/PDB). It uses DSSP (via Biopython) to obtain
    secondary structure, relative solvent accessibility, and backbone torsion angles (phi/psi).
    Additional physicochemical properties are computed or retrieved. Outputs a comprehensive
    JSON report with per-residue data and overall statistics.
    Useful for structural bioinformatics, machine learning feature generation, and protein analysis.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - khaled196
    - Mingkai14
