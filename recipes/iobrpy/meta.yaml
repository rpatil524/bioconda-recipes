{% set name = "iobrpy" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 23547ed6ce4171b4cb358b5c8e42a249e9ce338398b848a15fae8ecc4549a0d5

build:
  number: 0
  # Not noarch: the PyPI source distribution vendors Linux-specific
  # executables/shared libraries under src/iobrpy/SpecHLA/bin/.
  skip: true  # [not linux64 or py<311 or py>=314]
  run_exports:
    - {{ pin_subpackage(name|lower, max_pin="x.x") }}
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel

  run:
    - python >=3.11,<3.14
    - numpy >=1.22
    - pandas >=1.5
    - scipy >=1.9
    - scikit-learn >=1.2
    - statsmodels >=0.13
    - matplotlib-base >=3.7
    - tqdm >=4.66
    - click >=8.0
    - gseapy >=1.0.6
    - joblib >=1.3
    - regex >=2024.5
    - tiktoken >=0.11,<0.13
    - multiqc ==1.31
    - xarray >=0.20
    - requests >=2.32
    - prompt-toolkit >=3.0
    - pysam ==0.23.3
    - biopython >=1.83
    - fastp
    - star
    - salmon
    - gzip
    - trust4
    - samtools ==1.21

test:
  commands:
    - python -c "import iobrpy, iobrpy.main, iobrpy_cli, iobrpy_result"
    - iobrpy --help
    - iobrpy-cli --help

about:
  home: https://github.com/IOBR/IOBRpy
  license: MIT
  license_file: LICENSE
  summary: Immuno-Oncology Biological Research using Python (IOBRpy)
  doc_url: https://github.com/IOBR/IOBRpy
  dev_url: https://github.com/IOBR/IOBRpy

extra:
  recipe-maintainers:
    - hhn0527
  skip-lints:
    - should_be_noarch_generic
