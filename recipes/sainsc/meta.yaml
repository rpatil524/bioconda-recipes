{% set name = "sainsc" %}
{% set version = "0.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/sainsc-{{ version }}.tar.gz
  sha256: b82dd5802a5604f00fb51f0d286c81ab998869c27d910d41a2d14dda00fa4644

build:
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  number: 0
  skip: True  # [(osx and not arm64) or py < 312]
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ stdlib('c') }}
  host:
    - python
    - setuptools >=64.0.0
    - setuptools-scm >=8
    - setuptools-rust >=1.10
    - pip
  run:
    - python
    - anndata >=0.11
    - h5py >=3
    - matplotlib-base >=3.7
    - matplotlib-scalebar
    - numpy >=1.24
    - pandas >=2.0
    - polars >=1.39,<2
    - scikit-image >=0.20
    - scipy >=1.10
    - seaborn-base >=0.11

test:
  imports:
    - sainsc

about:
  home: https://github.com/HiDiHlabs/sainsc
  summary: "Segmentation-free Analysis of In Situ Capture data."
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://sainsc.readthedocs.io
  dev_url: https://github.com/HiDiHlabs/sainsc

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - niklasmueboe
