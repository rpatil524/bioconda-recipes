{% set name = "NEAT" %}
{% set version = "4.6.1" %}

package:
  name: '{{ name|lower }}'
  version: '{{ version }}'

source:
  url: https://github.com/ncsa/{{ name }}/archive/{{ version }}.tar.gz
  sha256: ada5e47518a2bbaa00aa08afeb812a7077187b0c75e3fe62ab8266c5ae1904c5
  
build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install --no-deps --no-build-isolation --no-cache-dir -vvv ."
  run_exports:    
    - {{ pin_subpackage('neat', max_pin="x") }}

requirements:
  host:
    - python >=3.10
    - poetry-core >=1.0.0
    - pip
  run:
    - python >=3.10
    - biopython =1.85
    - pkginfo
    - matplotlib-base
    - numpy
    - seaborn-base
    - pyyaml
    - scipy
    - bedtools
    - pybedtools >=0.9.0
    - htslib
    - pysam
    - frozendict

test:
  commands:
    - neat -h | grep read-simulator

about:
  home: "https://github.com/ncsa/NEAT"
  license: "BSD-3-Clause"
  license_family: BSD
  license_file: "LICENSE.md"
  summary: "Toolset for generating synthethic FASTQ, VCF and BAM files."
  dev_url: "https://github.com/ncsa/NEAT"
