{% set version = "1.2" %}
{% set name = "enzbert" %}
{% set sha256 = "fb4173e4c4facdbe402f8b4bc1827496bb8ae7cd45cb7893b45ef1b068cb2ede" %} 

package:
  name: enzbert
  version: '{{ version }}'

source:
  url: https://gitlab.inria.fr/fcoste/enzbert/-/archive/v{{ version }}/enzbert-v{{ version }}.tar.gz 
  sha256: {{ sha256 }}

build: 
  noarch: python
  number: 0
  entry_points:
    - enzbert = predictions:main
  script: {{ PYTHON }} -m pip install --no-deps --ignore-installed --no-cache-dir -vvv . 
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}


requirements:
  host:
    - python 
    - pip
    - setuptools 
  run:
    - python 
    - pytorch ==1.9.1
    - transformers ==4.2.2
    - biopython 
    - matplotlib-base
    - numpy
    - pandas
    - requests
    - scikit-learn
    - scipy
    - seaborn
    - statsmodels
    - sty
    - tqdm
    - goatools
    - lime
    - torchmetrics
    - captum
    - streamlit
    - ijson

test:
  commands:
    - enzbert --help

about:
  home: https://gitlab.inria.fr/fcoste/enzbert
  license: "AGPL-3.0-or-later"
  license_family: AGPL
  license_file: LICENSE
  summary: "Run EnzBert model that predicts the functional annotation of enzymes from protein sequences"



