{% set name = "somalier" %}
{% set version = "0.3.3" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/brentp/somalier/archive/refs/tags/v{{ version }}.tar.gz
  sha256: bad542343514373f4f3dcf40d814754dba02afda4cbf4bb24a44297c777a2afe

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - nim >=2.0.4  # [not arm64]
  host:
    - curl
    - openblas
    - htslib
  run:
    - openblas
    - htslib

test:
  commands:
    - somalier -h

about:
  home: "https://github.com/brentp/somalier"
  dev_url: "https://github.com/brentp/somalier"
  doc_url: "https://github.com/brentp/somalier/blob/v{{ version }}/README.md"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Fast sample-swap and relatedness checks on BAMs/CRAMs/VCFs/GVCFs."

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - doi:10.1186/s13073-020-00761-2
    - biotools:somalier
  skip-lints:
    - compiler_needs_stdlib_c
