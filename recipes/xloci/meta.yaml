{% set name = "xloci" %}
{% set version = "0.0.5" %}

package:
 name: {{ name }}
 version: {{ version }}

source:
 url: https://github.com/alejandrogzi/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
 sha256: cd9e543bd69ef0a8eb9ac5ab7f9262c225b85f02a19734116c8390dacff49d13

build:
 number: 0
 run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler("cxx") }}
    - {{ compiler("rust") }}
    - cargo-bundle-licenses
    - pkg-config

test:
 commands:
   - xloci --help
   - xloci --version

about:
 home: "https://github.com/alejandrogzi/xloci"
 license_family: APACHE
 license: "Apache-2.0"
 summary: "get sequences from 2bit/fa using bed/gtf/gff"
 dev_url: "dev_url: https://github.com/alejandrogzi/xloci"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - alejandrogzi
  skip-lints:
    - compiler_needs_stdlib_c
