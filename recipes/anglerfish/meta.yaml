{% set version = "0.7.0" %}

package:
  name: anglerfish
  version: {{ version }}

source:
  - url: https://pypi.io/packages/source/b/bio_anglerfish/bio_anglerfish-{{ version }}.tar.gz
    sha256: f756fbc32a55cc98b2fd5e315f503bdebe52d85cc36eb3d12771d0deb2fce846
  - url: https://raw.githubusercontent.com/NationalGenomicsInfrastructure/anglerfish/refs/tags/{{ version }}/requirements.txt
    sha256: a85b16d1e4b5a7787dd0990e71f02c679fd678c8ac9d7c8a6dba3b3b58467ee2

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-build-isolation --no-deps --no-cache-dir -vvv
  entry_points:
    - anglerfish=anglerfish.cli:app
  run_exports:
    - {{ pin_subpackage('anglerfish', max_pin="x.x") }}

requirements:
  host:
    - pip
    - python
    - setuptools
  run:
    - biopython
    - minimap2 ==2.28
    - numpy
    - pandas
    - python
    - python-levenshtein
    - pyyaml
    - typer
    - typing_extensions

test:
  imports:
    - anglerfish.demux
    - anglerfish.demux.demux
    - anglerfish.demux.samplesheet
  commands:
    - anglerfish --help

about:
  home: "https://github.com/NationalGenomicsInfrastructure/anglerfish"
  license: MIT
  license_family: MIT
  summary: "Anglerfish, a tool to demultiplex Illumina libraries from ONT data"
  license_file: LICENSE

extra:
  recipe-maintainers:
    - remiolsen
