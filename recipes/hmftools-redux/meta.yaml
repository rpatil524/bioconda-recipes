{% set version = "2.0.1" %}
{% set beta_suffix = "" %}
{% set sha256 = "ee23f8cccdae1424a6186188db1295a51fd301d2fb88c399255ec11c12b5022b" %}

package:
  name: hmftools-redux
  version: '{{ version }}'

source:
  url: https://github.com/hartwigmedical/hmftools/releases/download/redux-v{{ version }}/redux_v{{ version }}{{ beta_suffix }}.jar
  sha256: '{{ sha256 }}'

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage('hmftools-redux', max_pin="x.x") }}

requirements:
  run:
    - openjdk >=8,<=21
    - samtools >=1.14
    - bioconductor-variantannotation
    - bioconductor-genomicranges
    - r-dplyr
    - r-tidyr
    - r-ggplot2
    - r-patchwork
    - xorg-libxt
    - font-ttf-dejavu

test:
  commands:
    - 'redux -version | grep Redux'

about:
  home: https://github.com/hartwigmedical/hmftools/tree/master/redux
  license: GPL-3.0-only
  license_family: GPL
  summary: Post-processing read alignments to control sequencing errors and biases
