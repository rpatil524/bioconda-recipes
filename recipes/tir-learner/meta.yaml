{% set name = "TIR-Learner" %}
{% set version = "4.05" %}
{% set sha256 = "c04ebe0dd3b8a5455245f16660cbf7ac6a9eace5d492422ecc2aac29f49119dd" %}

package:
  name: {{ name | lower }}
  version: {{ version }}

source:
  url: https://github.com/KGerhardt/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage(name | lower, max_pin='x') }}

requirements:
  run:
    - python >=3.9,<3.13
    - numpy
    - pyfastx
    - pywfa
    - keras
    - pytorch
    - genometools-genometools
    - grfmite-rs
    - blast
    - pigz

test:
  commands:
    - TIR-Learner --help
    - tirlearner4 --help

about:
  home: https://github.com/KGerhardt/{{ name }}
  summary: "Accelerated tool for identifying TIR transposable elements"
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  dev_url: https://github.com/KGerhardt/{{ name }}
  doc_url: https://github.com/KGerhardt/{{ name }}/blob/main/README.md
