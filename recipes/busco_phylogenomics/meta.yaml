{% set name = "busco_phylogenomics" %}
{% set version = "20260630" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/jamiemcg/{{ name }}/archive/refs/tags/{{ version }}.tar.gz
  sha256: 4d51cedbd104499f9581de207a48181822c570f0493524380604e45a49840b0c

build:
  number: 0
  noarch: python
  script: bash conda_build_package.sh

  run_exports:
    - {{ pin_subpackage('busco_phylogenomics', max_pin=None) }}

requirements:
  build:
    - python >=3.8
  run:
    - python >=3.8
    - biopython
    - muscle >=5.1
    - iqtree
    - fasttree
    - trimal
    - tqdm
    - mafft

test:
  commands:
    - BUSCO_phylogenomics.py -h
    - count_buscos.py -h

about:
  home: https://github.com/jamiemcg/BUSCO_phylogenomics
  license: MIT
  license_file: LICENSE
  license_family: MIT
  summary: 'Utility script to construct species phylogenies using BUSCO proteins.'

extra:
  maintainers:
    - jamiemcg
