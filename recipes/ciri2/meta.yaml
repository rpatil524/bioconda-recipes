{% set name = "ciri2" %}
{% set version = "2.0.6" %}

package:
  name: {{ name }}
  version: {{ version }}

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

source:
  url: https://sourceforge.net/projects/ciri/files/CIRI2/CIRI_v{{ version }}.zip
  sha256: d0baef7e6b4589110f7cbc39f2ed168a4b86bc54d3b12360587d5336ae65e69b


requirements:

  host:
    - perl >=5.8
   
  run:
    - perl >=5.8
    - bwa

test:
  commands:
    - CIRI2.pl -H

about:
  home: https://ciri-cookbook.readthedocs.io/en/latest/CIRI2.html
  license: GPL-2.0-only
  license_file: CIRI_v{{ version }}/LICENSE.txt
  summary: 'CIRI2: Circular RNA identification based on multiple seed matching'
  dev_url: "https://github.com/bioinfo-biols/CIRI-full/tree/master/bin/CIRI_v2.0.6"
  doc_url: "https://ciri-cookbook.readthedocs.io/en/latest/CIRI2.html"

extra:
  identifiers:
    - doi:10.1093/bib/bbx014
  recipe-maintainers:
    - razmia02