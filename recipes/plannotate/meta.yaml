{% set name = "plannotate" %}
{% set version = "2.0.0" %}
{% set sha256 = "c0b83e6895cca4895143d5e05704f9e99c9da71389a9575b2e6f2bc913b3d4d6" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/mmcguffi/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  run_exports:
    - {{ pin_subpackage('plannotate', max_pin="x") }}

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools
  run:
    - python >=3.10
    - biopython >=1.81
    - numpy >=1.23
    - pandas >=1.5,<3
    - pyyaml >=6
    - rich >=13
    - typer >=0.12
    - blast >=2.10.1
    - diamond >=2.0.13
    - infernal >=1.1.4
    - bokeh >=3.4,<4
    - tabulate >=0.9

test:
  commands:
    - plannotate batch --help

about:
  home: "https://github.com/mmcguffi/pLannotate"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: LICENSE
  summary: "Webserver and command line tool for annotating engineered plasmids."
  dev_url: "https://github.com/mmcguffi/pLannotate"
  doc_url: "https://github.com/mmcguffi/pLannotate/blob/v{{ version }}/README.md"

extra:
  recipe-maintainers:
    - mmcguffi
    - rpetit3
  identifiers:
    - biotools:plannotate
