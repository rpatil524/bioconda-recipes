{% set name = "derip2" %}
{% set version = "0.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/derip2-{{ version }}.tar.gz
  sha256: 36f2b4754804a748d5044b7e4e11eca170bd5e63b8e0cc63cbf1da270084cec1

build:
  run_exports:
    - {{ pin_subpackage('derip2', max_pin="x.x") }}
  entry_points:
    - derip2 = derip2.app:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >=3.9
    - biopython >1.80
    - click
    - ete4
    - matplotlib-base
    - numpy
    - pandas
    - tqdm

test:
  imports:
    - derip2
  commands:
    - pip check
    - derip2 --help
    - derip2 --version
    - derip2-spectra --version
    - derip2-spectra --help
  requires:
    - pip

about:
  home: https://adamtaranto.github.io/deRIP2/ 
  dev_url: https://github.com/Adamtaranto/deRIP2
  summary: Predict ancestral sequence of fungal repeat elements by correcting for RIP-like mutations in multi-sequence DNA alignments.
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Adamtaranto
