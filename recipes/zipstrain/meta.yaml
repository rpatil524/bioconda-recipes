{% set name = "zipstrain" %}
{% set version = "0.11.0" %}   

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 5f8a99f5475afb977bc36702b2310236d6001bde5e205abaa0c61d510e0149a7

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv
  run_exports:
    - {{ pin_subpackage('zipstrain', max_pin="x.x") }}

requirements:
  host:
    - python >=3.12
    - poetry-core   
    - pip
    
  run:
    - python >=3.12
    - samtools 
    - click
    - polars
    - plotly
    - numpy
    - seaborn
    - scipy
    - pyarrow
    - aiofiles
    - pydantic >=2,<3
    - rich
    - psutil
    - duckdb
    - pandas
    - matplotlib-base
    - h5py
    - pytorch
test:
  imports:
    - zipstrain
  commands:
    - zipstrain --help
    - samtools --version
    - zipstrain compare --help
    - zipstrain utilities --help

about:
  home: https://github.com/OlmLab/ZipStrain  
  summary: Fast strain-level metagenomics
  license: MIT     
  license_family: MIT
  dev_url: https://github.com/OlmLab/ZipStrain

