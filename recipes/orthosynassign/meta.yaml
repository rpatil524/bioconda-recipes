{% set name = "orthosynassign" %}
{% set version = "1.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/stajichlab/orthoSynAssign/archive/refs/tags/v{{ version }}.tar.gz
  sha256: bea762e8cb3d7df1da6b7d77adc0e32e6173ea9446f149718166a8a92dc4a624

build:
  number: 0
  script: 
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
      - {{ pin_subpackage(name|lower, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
  host:
    - pip
    - python >=3.9,<3.15
    - maturin >=1.0,<2.0
  run:
    - pygenomeviz >=1.6.0
    - python >=3.9,<3.15

test:
  commands:
    - orthosynassign --help
    - orthosynassign-vis --help

about:
  home: https://github.com/stajichlab/orthoSynAssign
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE
  summary: Ortholog Synteny Assignment Tool for analyzing OrthoFinder results with genome annotations
  description: |
    Ortholog Synteny Assignment Tool - A Python tool to refine orthologous groups using synteny information inferred from genome
    annotation files (BED converted from GFF3/GTF). This is a Python re-implementation of the OrthoRefine, which is written in C++
    but had some issues with sample matching and memory usage. This tool is designed to be more efficient, easier to use, and more
    flexible for custom analyses. In addition, to ensure optimal processing speed and memory usage, the core synteny analysis is
    implemented in Rust.

extra:
  recipe-maintainers:
    - chtsai0105
  identifies:
    - 10.5281/zenodo.18762979
