{% set name = "pybarrnap" %}
{% set version = "0.5.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/pybarrnap-{{ version }}.tar.gz
  sha256: db47b824fd635197c73b527aedd82776e6a4e4688bd0f95e674c752ac9a5daf6

build:
  number: 0
  noarch: python
  entry_points:
    - pybarrnap = pybarrnap.scripts.pybarrnap:main
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  run_exports:
    - {{ pin_subpackage('pybarrnap', max_pin="x.x") }}

requirements:
  host:
    - python >=3.9
    - hatchling ==1.26.3
    - pip
  run:
    - python >=3.9
    - biopython >=1.80
    - pyhmmer >=0.12.1

test:
  imports:
    - pybarrnap
  commands:
    - pybarrnap --help

about:
  home: "https://github.com/moshi4/pybarrnap"
  summary: "Python implementation of barrnap (Bacterial ribosomal RNA predictor)."
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: LICENSE
  dev_url: "https://github.com/moshi4/pybarrnap"
  doc_url: "https://github.com/moshi4/pybarrnap/blob/v{{ version }}/README.md"

extra:
  recipe-maintainers:
    - moshi4
