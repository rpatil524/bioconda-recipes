{% set version = "3.1.0" %}

package:
  name: bismark
  version: {{ version }}

source:
  # Rust GA tag (distinct from the Perl `v*` tags).
  url: https://github.com/FelixKrueger/Bismark/archive/refs/tags/bismark-rust-v{{ version }}.tar.gz
  sha256: 638d7b068031b23fca9c3b3ca5a6b0db675a4da9d48975420fa642b584b5e411

build:
  number: 0
  skip: True  # [osx and x86_64]
  run_exports:
    - {{ pin_subpackage('bismark', max_pin="x") }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}          # mimalloc compiles C at build
    - {{ stdlib('c') }}
    - make
    - pkg-config
  run:
    # External aligner backends. No samtools/perl/coreutils — the Rust suite does its
    # own BAM/SAM/CRAM I/O (noodles) and gzip (gzp); rammap is compiled in.
    - bowtie2 >=2.5.5
    - hisat2
    - minimap2

test:
  commands:
    - bismark --version | grep -q "${PKG_VERSION}"
    - bismark --help > /dev/null
    - for t in deduplicate_bismark bismark_methylation_extractor bismark2bedGraph coverage2cytosine bismark_genome_preparation bam2nuc NOMe_filtering filter_non_conversion methylation_consistency bismark2report bismark2summary ; do $t --version > /dev/null ; done

about:
  home: https://github.com/FelixKrueger/Bismark
  license: GPL-3.0-only
  license_family: GPL3
  license_file: license.txt
  summary: "Bisulfite read aligner and methylation caller (Rust suite)"
  description: |
    Bismark maps bisulfite-treated sequencing reads to a reference genome and calls
    cytosine methylation in CpG, CHG and CHH context. As of v3.0.0 it is a single Rust
    multicall binary: run `bismark <subcommand>` or the classic tool names as argv[0]
    aliases. All BAM/SAM/CRAM I/O is pure-Rust (no samtools). The Perl v0.25.x remains
    available as `bismark=0.25.1`.
  dev_url: https://github.com/FelixKrueger/Bismark

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - FelixKrueger
    - ewels
  identifiers:
    - biotools:bismark
    - usegalaxy-eu:bismark_bowtie2
    - doi:10.1093/bioinformatics/btr167
