{% set name = "synth-saxs" %}
{% set version = "0.1.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace("-", "_") }}-{{ version }}.tar.gz
  sha256: ac8a5c22f266c8b8ca86d3af32ea62d4863466ebb5b5db6ca81692d33838a213

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools
  run:
    - python >=3.10
    - numpy >=1.26.4
    - biotite >=0.35.0
    - scipy >=1.7.0

test:
  imports:
    - synth_saxs

about:
  home: https://github.com/elkins/synth-saxs
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Education-focused SAXS profile simulation from protein coordinates
  doc_url: https://github.com/elkins/synth-saxs
  dev_url: https://github.com/elkins/synth-saxs

extra:
  recipe-maintainers:
    - elkins
