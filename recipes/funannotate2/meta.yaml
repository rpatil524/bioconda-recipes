{% set name = "funannotate2" %}
{% set version = "26.6.21" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/funannotate2-{{ version }}.tar.gz
  sha256: 3fa5ac1a60e496c390f58c568eadff065f5c9324571ba47923bb4b2a9af1d6d1

build:
  number: 0
  noarch: python
  entry_points:
    - funannotate2 = funannotate2.__main__:main
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin=None) }}

requirements:
  host:
    - python >=3.7,<3.14
    - hatchling
    - pip
  run:
    - python >=3.7,<3.14
    - natsort
    - numpy
    - mappy
    - gfftk >=26.2.12
    - buscolite >=26.6.21
    - gapmm2 >=25.8.12
    - pyhmmer >=0.12.0
    - pyfastx >=2.0.0
    - requests
    - gb-io >=0.3.2
    - json-repair
    - pytantan >=0.1.4
    - psutil
    - annorefine >=2026.2.9
    - augustus >=3.5.0
    - snap
    - glimmerhmm
    - diamond
    - trnascan-se
    - table2asn

test:
  imports:
    - funannotate2
  commands:
    - funannotate2 --help

about:
  home: "https://github.com/nextgenusfs/funannotate2"
  summary: "Funannotate2: eukarytoic genome annotation pipeline."
  license: "BSD-2-Clause"
  license_family: BSD
  license_file: LICENSE
  dev_url: "https://github.com/nextgenusfs/funannotate2"
  doc_url: "https://funannotate2.readthedocs.io/en/latest"

extra:
  recipe-maintainers:
    - nextgenusfs
