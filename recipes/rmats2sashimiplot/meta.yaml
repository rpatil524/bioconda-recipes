{% set name = "rmats2sashimiplot" %}
{% set version = "4.0.0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: 4f1442b22c305fe7fc75b84f38d471b0668ca9ae6ef55363d3e4fcbba71425ec

build:
  number: 0
  noarch: python
  entry_points:
    - rmats2sashimiplot=rmats2sashimiplot.rmats2sashimiplot:main
    - index_gff=MISO.misopy.index_gff:main
    - sashimi_plot=MISO.misopy.sashimi_plot.sashimi_plot:main
  script: "{{ PYTHON }} -m pip install . --ignore-installed --no-deps -vv"
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - pip
    - python
    - setuptools
  run:
    - bedtools
    - matplotlib-base
    - numpy
    - pysam
    - python
    - samtools
    - scipy

test:
  imports:
    - MISO
    - MISO.misopy
    - MISO.misopy.sashimi_plot
    - MISO.misopy.sashimi_plot.plot_utils
    - rmats2sashimiplot
  commands:
    - rmats2sashimiplot --help
    - index_gff --help
    - sashimi_plot --help

about:
  home: "https://github.com/Xinglab/rmats2sashimiplot"
  license: "GNU General Public v2 (GPLv2)"
  license_family: GPL2
  license_file: LICENSE
  summary: "rmats2sashimiplot"
