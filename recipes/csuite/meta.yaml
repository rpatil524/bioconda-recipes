{% set name = "csuite" %}
{% set version = "0.1.0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: 3f80fcffacb57b55c4f6c228790eabb77d27078444a5c06bbfc8c7407d8c3e33

build:
  number: 0
  noarch: python
  entry_points:
    - csuite = csuite.main:main
  script: "{{ PYTHON }} -m pip install . -vvv --no-build-isolation --no-cache-dir"
  run_exports:
    - {{ pin_subpackage('csuite', max_pin="x") }}

requirements:
  host:
    - python >=3.12
    - pip
    - setuptools
  run:
    - python >=3.12
    - cblaster >=1.4.0
    - cagecleaner >=1.5.2
    - cfoldseeker >=0.2.0

test:
  commands:
    - csuite -h

about:
  home: "https://github.com/LucoDevro/CAGEcleaner"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Streamlined workflows for query-based gene cluster mining"
  doc_url: "https://csuite-miner.readthedocs.io/"
  dev_url: "https://github.com/LucoDevro/csuite"

extra:
  recipe-maintainers:
    - LucoDevro
