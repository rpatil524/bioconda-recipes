{% set name = "isoseq" %}
{% set version = "26.2.0" %}
{% set sha256 = "94d008291457c5efe723f282bf963a2c4a5c026421e887397ddb94cd878cce2f" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/PacificBiosciences/IsoSeq/releases/download/v{{ version }}/isoseq
  sha256: {{ sha256 }}

build:
  number: 0
  skip: True  # [osx]
  binary_relocation: False
  run_exports:
    - {{ pin_subpackage('isoseq', max_pin='x.x') }}

test:
  commands:
    - isoseq -h

about:
  home: https://github.com/PacificBiosciences/pbbioconda
  license: BSD-3-Clause-Clear
  summary: Iso-Seq - Scalable De Novo Isoform Discovery

extra:
  recipe-maintainers:
    - armintoepfer
    - pb-dseifert
  skip-lints:
    #repackaged binary
    - should_be_noarch_generic
