{% set name = "beast-pype" %}
{% set version = "0.9.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/beast_pype-{{ version }}.tar.gz
  sha256: c43a1fe61e09a8c95fbc8b75914c676367ea91e2d3434cdee57c256e58efb08b

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --no-cache-dir
  entry_points:
    - beast_pype = beast_pype.cli:beast_pype
  noarch: python
  number: 0
  run_exports:
    - {{ pin_subpackage('beast-pype', max_pin="x") }}

requirements:
  host:
    - python >=3.10
    - setuptools >=77.0.3
    - unidep >=2.0.0
    - pip >=25.3
  run:
    # BEAST itself
    - beast2 >=2.7.7
    # Python
    # beast2-xml has had the occaisonal issue with installation python 3.12
    # on some OSs. beast2-xml works on suggest python 3.10 sticking to python 3.10.
    - python >=3.10
    # Bioinformatics
    - biopython >=1.86
    - nextclade >=3.18.1
    - iqtree >=3.0.1
    - treetime >=0.11.4
    - beast2-xml >=1.6.2
    - dark-matter >=5.1.2
    - seqkit >=2.12.0
    - ete3 >=3.1.1
    # Python Data Sci
    - scipy >=1.16.3
    - python-dateutil >=2.9.0
    - numpy >=2.4.0
    - pandas >=2.3.3
    # Plotting figures.
    - seaborn >=0.13.2
    - matplotlib-base >=3.10.8
    # MCMC diagnostics_of_selection
    - arviz >=1.2.0
    - xarray >=2025.12.0
    # Utils
    - click >=8.3.1
    - pyyaml >=6.0.3
    - parallel >=2051122
    # Jupyter & Jutyper based workflow
    - jupyter >=1.1.1
    - papermill >=2.6.0
    - nbconvert >=7.16.6
    - nbformat >=5.10.4
    - ipywidgets >=8.1.8
    - bash_kernel >=0.10.0
    - ipykernel >=4.3.1
    # For plotting trees using R
    - r-irkernel >=1.3.2
    - bioconductor-treeio >=1.34.0
    - bioconductor-ggtree >=4.0.4
    - r-ggplot2 >=4.0.2
    - r-readr >=2.2.0
    - r-lubridate >=1.9.5
    - r-dplyr >=1.2.0
    - r-png >=0.1_8
    - r-tidyr >=1.3.2
    - r-htmltools >=0.5.9


test:
  imports:
    - beast_pype
  requires:
    - pytest >=9.0.2
    - pytest-xdist >=3.8.0
    - psutil >=7.2.2

about:
  summary: A package of BEAST 2 pipelines for phylodynamics.
  home: https://github.com/m-d-grunnill/BEAST_pype
  license: GPL-2.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - m-d-grunnill
