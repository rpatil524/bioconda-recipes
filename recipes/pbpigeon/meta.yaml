{% set name = "pbpigeon" %}
{% set version = "26.2.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://github.com/PacificBiosciences/pigeon/releases/download/v{{ version }}/pigeon
    sha256: 680f41c80ab076a5c3b2f5a0e7ca51c4dfad858d4597535b5088bd65779ac3c8

build:
  # repackaged binaries
  skip: True  # [osx]
  number: 0
  run_exports:
    - {{ pin_subpackage('pbpigeon', max_pin='x.x') }}

test:
  commands:
    - pigeon -h

about:
  home: https://github.com/PacificBiosciences/pigeon
  license: BSD-3-Clause-Clear
  summary: PacBio transcript toolkit

extra:
  recipe-maintainers:
    - jmattick
    - armintoepfer
    - pb-dseifert
  skip-lints:
    #repackaged binary
    - should_be_noarch_generic
