{% set name = "harpy" %}
{% set version = "4.1.3" %}
{% set sha256 = "7a15dde4b6a1f898d5211547953adb1235c7575cfa7ed68b7ee8c50fb2c416e1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/pdimens/harpy/releases/download/{{ version }}/harpy.{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  entry_points:
    - harpy = harpy.__main__:cli
    - harpy-utils = harpy.utils:cli
    - hv = harpy.commands.view:view
  run_exports:
    - {{ pin_subpackage('harpy', max_pin="x") }}

requirements:
  build:
    - {{ compiler('go-nocgo') }}
    - {{ stdlib('c') }}
  host:
    - python >=3.11,<3.14
    - pip
    - setuptools-scm >=8
  run:
    - altair >=6.0
    - bcftools >=1.23
    - click >=8.2
    - conda >=24.8
    - djinn >=2.3
    - htslib >=1.23
    - jupyter-book >=2.1.0
    - papermill >=2.6
    - pandas >=2.3.3
    - pillow >=12.2
    - polars >=1.39
    - pysam >=0.23
    - python >=3.11,<3.14
    - rich-click >=1.9.3
    - samtools >=1.23
    - seqtk
    - snakemake-minimal >=9.19.0
    - vl-convert-python >=1.9.0
    - xeus-python >=0.18.1

test:
  commands:
    - "snakemake --version"
    - "harpy --version"

about:
  home: "https://github.com/pdimens/harpy"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: LICENSE
  summary: "Process linked-read or WGS data, from raw sequences to phased haplotypes."
  description: |
    Harpy is a command-line tool to easily process platform-agnostic linked-read or WGS data. It uses
    Snakemake under the hood to execute different workflows (quality control, trimming, 
    alignment, variant calling, phasing, etc.), but the user is rarely, if ever, exposed
    to Snakemake directly. With an emphasis on user-friendliness, parallelization, transparency,
    and reproducibility, Harpy quickly handles data processing so that you can focus more
    on analyzing your data. 
  doc_url: "https://pdimens.github.io/harpy"
  dev_url: "https://github.com/pdimens/harpy"

extra:
  recipe-maintainers:
    - pdimens
