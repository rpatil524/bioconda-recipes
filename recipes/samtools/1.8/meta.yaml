{% set version = "1.8" %}

package:
  name: samtools
  version: {{ version }}

source:
  url: https://github.com/samtools/samtools/releases/download/{{ version }}/samtools-{{ version }}.tar.bz2
  sha256: c942bc1d9b85fd1b05ea79c5afd2805d489cd36b2c2d8517462682a4d779be16

build:
  number: 6
  skip: True  # [osx and x86_64]
  run_exports:
    - {{ pin_subpackage("samtools", max_pin="x") }}

requirements:
  build:
    - make
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    # ncurses not compatible with samtools, see note in build.sh
    #- ncurses
    - bzip2
    - curl
    - openssl  # [not osx]
    - xz
    - zlib
  run:
    - curl
    - openssl  # [not osx]

test:
  commands:
    - samtools --help

about:
  home: "https://github.com/samtools/samtools"
  license: MIT
  license_family: MIT
  summary: "Tools for dealing with SAM, BAM and CRAM files."
  dev_url: "https://github.com/samtools/samtools"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - biotools:samtools
