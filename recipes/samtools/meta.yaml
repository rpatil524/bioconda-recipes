{% set version = "1.24" %}

package:
  name: samtools
  version: {{ version }}

build:
  number: 1
  run_exports:
    - {{ pin_subpackage("samtools", max_pin="x") }}

source:
  url: https://github.com/samtools/samtools/releases/download/{{ version }}/samtools-{{ version }}.tar.bz2
  sha256: 89b2a440123eeaa400392ce1736e7d60ce9041843027d76819753c5a8246bfdd

requirements:
  build:
    - make
    - {{ compiler('c') }} 
    - {{ stdlib('c') }}
  host:
    - htslib
    - ncurses
    - zlib

about:
  home: https://github.com/samtools/samtools
  license: MIT
  license_file: LICENSE
  summary: Tools for dealing with SAM, BAM and CRAM files

test:
  commands:
    - samtools --help
    # test if https protocol works, if it doesn't samtools will fail with "Protocol not supported"
    - samtools view https://htslib.org/ 2>&1 | grep -q 'fail to read the header'

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - biotools:samtools
    - usegalaxy-eu:samtools_flagstat
