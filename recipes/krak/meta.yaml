{% set name = "krak" %}
{% set version = "0.4.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/clintval/{{ name }}/archive/{{ version }}.tar.gz
  sha256: 6c8586124de3ca15a1ba803b4ed56c682fcfbf8f7cca0aa7b2b5bb2bdfd19663

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - clangdev
    - pkg-config
    - make
    - cmake

test:
  commands:
    - {{ name }} --help

about:
  home: "https://github.com/clintval/{{ name }}"
  license: MIT
  license_family: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: "An addicting set of Kraken-enhancing tools."
  dev_url: "https://github.com/clintval/{{ name }}"
  doc_url: "https://github.com/clintval/{{ name }}/blob/{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - clintval
