{% set name = "perl-datetime-timezone" %}
{% set version = "2.69" %}
{% set sha256 = "a8e285cd14bc7f40daae8028bc912e1d0c53bb9ac464659ad64a36cc5e2bf35f" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/D/DR/DROLSKY/DateTime-TimeZone-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - make
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
  host:
    - perl
    - perl-app-cpanminus
    - perl-module-runtime
    - perl-test-requires
    - perl-test-more
    - perl-test-fatal
    - perl-namespace-autoclean
    - perl-specio
    - perl-extutils-makemaker
    - perl-try-tiny
    - perl-params-validationcompiler
  run:
    - perl
    - perl-app-cpanminus
    - perl-module-runtime
    - perl-namespace-autoclean
    - perl-specio
    - perl-try-tiny
    - perl-params-validationcompiler

test:
  commands:
    - perl -e "use DateTime::TimeZone"

about:
  home: "https://metacpan.org/release/DateTime-TimeZone"
  license: "Perl_5"
  summary: "Time zone object base class and factory."
  doc_url: "https://metacpan.org/release/DateTime-TimeZone"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
