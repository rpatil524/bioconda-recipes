{% set name = "cfoldseeker" %}
{% set version = "0.2.0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: 79e867556dae491b8585a62303bd84f37cea745e2aed6c98afca352e58c93d8b

build:
  number: 1
  noarch: python
  entry_points:
    - cfoldseeker = cfoldseeker.main:main
    - cfoldseeker-cds = cfoldseeker.build_cds_db:main
    - cfoldseeker-seqs = cfoldseeker.extract_sequences:main
  script: "{{ PYTHON }} -m pip install . -vvv --no-build-isolation --no-cache-dir"
  run_exports:
    - {{ pin_subpackage('cfoldseeker', max_pin="x") }}

requirements:
  host:
    - python >=3.12
    - pip
    - setuptools
  run:
    - python >=3.12
    - biopython
    - cblaster >=1.4.0
    - polars >=1.0.0
    - foldseek
    - networkx
    - requests
    - tqdm
    - kegg_pull

test:
  commands:
    - cfoldseeker -h

about:
  home: "https://github.com/LucoDevro/cfoldseeker"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Tool to find gene clusters using protein structure similarity"
  doc_url: "https://cfoldseeker.readthedocs.io/en/stable/"
  dev_url: "https://github.com/LucoDevro/cfoldseeker"

extra:
  recipe-maintainers:
    - LucoDevro
