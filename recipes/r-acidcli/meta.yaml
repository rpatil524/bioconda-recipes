{% set version = "0.3.3" %}
{% set github = "https://github.com/acidgenomics/r-acidcli" %}

package:
  name: r-acidcli
  version: "{{ version }}"

source:
  url: "{{ github }}/archive/v{{ version }}.tar.gz"
  sha256: 541fd6baab63ba534e2a352f821c21f9e1eebb2803eec3702e246e6d71185a49

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('r-acidcli', max_pin="x.x") }}

requirements:
  host:
    # Depends:
    - r-base
    # Imports:
    - r-cli >=3.6.1
    - r-crayon >=1.5.2
    - r-goalie >=0.7.0
    - r-rlang >=1.1.1
  run:
    # Depends:
    - r-base
    # Imports:
    - r-cli >=3.6.1
    - r-crayon >=1.5.2
    - r-goalie >=0.7.0
    - r-rlang >=1.1.1

test:
  commands:
    - $R -e "library('AcidCLI')"

about:
  home: https://r.acidgenomics.com/packages/acidcli/
  dev_url: "{{ github }}"
  license: Apache-2.0
  license_file: LICENSE.md
  license_family: APACHE
  summary: Interactive R command line interface toolkit for Acid Genomics
    packages.

extra:
  recipe-maintainers:
    - acidgenomics
    - mjsteinbaugh
