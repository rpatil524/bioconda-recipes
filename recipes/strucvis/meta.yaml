{% set name = "strucVis" %}
{% set version = "1.0.1" %}
{% set sha256 = "75fe82e694cc6bf233223ded1c7e14e83d560c839457a45eb1886581fb921115" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/MikeAxtell/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage('strucvis', max_pin="x.x") }}

requirements:
  run:
    - perl
    - samtools >=1.10
    - viennarna 2.*
    - ghostscript

test:
  commands:
    - strucVis -h
    - strucVis -v

about:
  home: https://github.com/MikeAxtell/strucVis
  license: GPL-3.0
  license_family: GPL
  license_file: LICENSE
  summary: 'strucVis : Display small RNA depth of coverage on a predicted RNA secondary structure'
