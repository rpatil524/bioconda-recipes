{% set name = "bamboozle" %}
{% set version = "0.5.0" %}
{% set sha256 = "e449f99006f881b9be6e9b513c09af0b306d8c7f849d99e368891e74a48ff8af" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/sandberg-lab/dataprivacy/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  entry_points:
    - BAMboozle = BAMboozle.BAMboozle:main
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.6
    - pip
    - setuptools
  run:
    - python >=3.6
    - pysam >=0.14.0
    - samtools

test:
  commands:
    - BAMboozle --help

about:
  home: https://github.com/sandberg-lab/dataprivacy
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: "Remove genetic variation from sequencing reads in BAM files to protect donor privacy."
  dev_url: https://github.com/sandberg-lab/dataprivacy

extra:
  identifiers:
    - doi:10.1101/2021.01.11.426206
  recipe-maintainers:
    - SaimMomin12

