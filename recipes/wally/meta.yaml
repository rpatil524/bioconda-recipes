{% set name = "wally" %}
{% set version = "0.8.1" %}
{% set sha256 = "6d78f7046c1e05462df4c61d7862972f42dedbaec5be3c3aa8a6a64f844668f1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/tobiasrausch/wally/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('wally', max_pin="x.x") }}

requirements:
  build:
    - make
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - pkg-config
  host:
    - zlib
    - bzip2
    - libdeflate
    - boost-cpp
    - libopencv >=4.5.3
    - htslib
  run:
    - boost-cpp
    - libopencv >=4.5.3
    - htslib

test:
  commands:
    - wally --help

about:
  home: "https://github.com/tobiasrausch/wally"
  license: "BSD-3-Clause"
  license_family: BSD
  license_file: LICENSE
  summary: "Visualization of aligned sequencing reads and genomic variants."
  dev_url: "https://github.com/tobiasrausch/wally"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - doi:10.1016/j.xgen.2023.100281
