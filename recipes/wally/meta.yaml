{% set name = "wally" %}
{% set version = "0.9.1" %}
{% set sha256 = "495665577b2f4a0a74d9d5db00883cd7e8812070802909043a4cfc47bf60e1c6" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://github.com/tobiasrausch/wally/archive/v{{ version }}.tar.gz
    sha256: {{ sha256 }}
  - url: https://github.com/blend2d/blend2d/archive/6dbc2cefbc996379e07104e34519a440b49b15d7.tar.gz
    sha256: 212a77ceebf8c37ad5ca7e7eac1757ce7aa911b88085b076a9ed24f6de6e36fa
    folder: src/blend2d

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('wally', max_pin="x.x") }}

requirements:
  build:
    - make
    - cmake
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - pkg-config
  host:
    - zlib
    - bzip2
    - libdeflate
    - boost-cpp
    - htslib
  run:
    - boost-cpp
    - htslib

test:
  commands:
    - wally --help

about:
  home: "https://github.com/tobiasrausch/wally"
  license: "BSD-3-Clause"
  license_family: BSD
  license_file: LICENSE
  summary: "Visualization of aligned sequencing reads and genomic variants."
  dev_url: "https://github.com/tobiasrausch/wally"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - doi:10.1016/j.xgen.2023.100281
