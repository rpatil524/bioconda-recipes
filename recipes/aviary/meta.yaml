{% set version = "0.13.1" %}
{% set name = "aviary" %}
{% set sha256 = "c24c40359dd3b966a94ed5116d52be8750e84e702718248852409de8283202ec" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/aviary-genome/aviary_genome-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  entry_points:
    - aviary = aviary.aviary:main
  run_exports:
    - {{ pin_subpackage('aviary', max_pin="x.x") }}

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - snakemake-minimal 9.*
    - ruamel.yaml >=0.15.99
    - numpy
    - pandas
    - polars
    - biopython
    - pigz >=2.6
    - parallel
    - bbmap
    - extern
    - pyopenssl >22.1.0
    - bird_tool_utils_python

test:
  commands:
    - {{ name }} --version | grep '{{ version }}'

about:
  home: "https://github.com/rhysnewell/aviary"
  doc_url: "https://rhysnewell.github.io/aviary"
  dev_url: "https://github.com/rhysnewell/aviary"
  license: "GPL-3.0-only"
  license_family: GPL3
  license_file: LICENSE
  summary: "aviary - Metagenomics pipeline using long and short reads."
  description: |
    Aviary is an easy to use hybrid assembler and metagenomic pipeline

    For more details see documentation: https://rhysnewell.github.io/aviary.
