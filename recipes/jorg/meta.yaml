{% set name = "jorg" %}
{% set version = "1.0.2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/lmlui/Jorg/archive/refs/tags/v{{ version }}.tar.gz
  sha256: fe883708a6df4c4875c74cc0783b6ede77cda44b3c37318f311fdd4d5b81c49c

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('jorg', max_pin="x.x") }}

requirements:
  build:
    - bash
    - sed
  run:
    - bash
    - coreutils
    - grep
    - sed
    - gawk
    - mira
    - seqtk

test:
  commands:
    - test -x "${PREFIX}/bin/jorg"
    - test -f "${PREFIX}/share/jorg/manifest_template.conf"
    - jorg --help

about:
  home: https://github.com/lmlui/Jorg
  summary: MAG circularization and iterative bin improvement workflow using MIRA
  description: |
    JORG is a shell-based workflow for iterative metagenome-assembled genome
    circularization and bin improvement using mirabait, MIRA, and seqtk.
  license: GPL-3.0-only
  license_file: LICENSE
  dev_url: https://github.com/lmlui/Jorg
  doc_url: https://github.com/lmlui/Jorg

extra:
  additional-platforms:
    - linux-aarch64
