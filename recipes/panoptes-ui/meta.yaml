{% set name = "panoptes-ui" %}
{% set version = "1.6.0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name|replace('-', '_') }}-{{ version }}.tar.gz"
  sha256: 16f8a3138353e9dc350a69d2e4bac79dd8ba05ec506092cefc55b6eb3454fc61

build:
  noarch: python
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin='x') }}
  entry_points:
    - panoptes=panoptes:main
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv"

requirements:
  host:
    - flask >=1.1.1
    - humanfriendly >=4.18
    - marshmallow >=3.0.1
    - pip
    - python >=3.11
    - setuptools
    - sqlalchemy >=1.3.7
  run:
    - flask >=1.1.1
    - humanfriendly >=4.18
    - marshmallow >=3.0.1
    # PostgreSQL driver, so conda installs and the biocontainer can use
    # PANOPTES_DB_URL=postgresql+psycopg2://... (panoptes 1.6.0 documents and
    # CI-tests PostgreSQL support; the container use case needs it built in).
    - psycopg2 >=2.9
    - python >=3.11
    - sqlalchemy >=1.3.7

test:
  imports:
    - panoptes
    - panoptes.routes
    - panoptes.server_utilities
    - panoptes.static
    - panoptes.static.src
    - panoptes.tests
  commands:
    - panoptes --help

about:
  home: "https://github.com/panoptes-organization/panoptes"
  license: MIT
  license_family: MIT
  license_file: LICENSE.md
  summary: "panoptes: monitor computational workflows in real time"

extra:
  recipe-maintainers:
    - fgypas
