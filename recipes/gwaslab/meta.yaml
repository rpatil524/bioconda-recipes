{% set name = "gwaslab" %}
{% set version = "4.1.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 6cc9b9133c15834484c5aec916ae18914055c8c3950b10b7fd33a194fb5710b7
  patches:
    - 0001-defer-sumstats-liftover-import.patch

build:
  number: 0
  noarch: python
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=3.9
    - pandas !=1.5,>=1.3,<=2.3.3
    - numpy >=1.21.2,<2
    - matplotlib-base >=3.8,<3.9
    - seaborn >=0.12
    - scipy >=1.12
    - pysam ==0.22.1
    - adjusttext >=0.7.3,<=0.8
    - scikit-allel >=1.3.5
    - h5py >=3.10.0
    - pyarrow
    - polars >=1.27.0
    - requests
    - pyyaml
    - bitarray
    - platformdirs

test:
  imports:
    - gwaslab
  commands:
    - gwaslab --help

about:
  home: https://cloufield.github.io/gwaslab/
  summary: Python toolkit for handling GWAS summary statistics
  license: GPL-3.0-only
  license_file: LICENSE
  dev_url: https://github.com/Cloufield/gwaslab

extra:
  recipe-maintainers:
    - lyh970817
