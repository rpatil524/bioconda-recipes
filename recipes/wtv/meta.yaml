{% set name = "wtv" %}
{% set version = "0.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/wtv-{{ version }}.tar.gz
  sha256: 24bd166cd8355b21b6cc498a03431f20f54fcd765293c8a42dde39f4fde69342

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  number: 0
  run_exports:
  - {{ pin_subpackage('wtv', max_pin="x.x") }}

requirements:
  host:
    - python >=3.10,<3.13
    - hatchling
    - pip
  run:
    - python >=3.10,<3.13
    - numpy >=2.0.0
    - pandas >=2.2.3,<3.0.0
    - matchms >=0.30.2,<0.31.0
    - lxml <6.0.0
    - rdkit <2025.0.0

test:
  imports:
    - wtv
  commands:
    - wtv-cli --help

about:
  summary: "A library and CLI for ion selection in mass spectrometry data."
  home: "https://recetox.github.io/wtv"
  license: "GPL-3.0-only"
  license_family: GPL3
  license_file: LICENSE
  doc_url: "https://recetox.github.io/wtv"
  
extra:
  recipe-maintainers:
    - acquayefrank
    - hechth
