{% set name = "compleasm" %}
{% set version = "0.2.8" %}
{% set hash = "fbad2a389e13ef7bd8c9ef90112729aeaccaedba722d43f96c0fa9bcda24f1f6" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://github.com/huangnengCSU/compleasm/archive/refs/tags/v{{ version }}.tar.gz"
  sha256: {{ hash }}
 
build:
  number: 0
  noarch: python
  entry_points:
    - compleasm=compleasm:main
  script:
    - {{ PYTHON }} -m pip install . -vv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x.x") }}

requirements:
  host:
    - pip
    - python
    - setuptools
  run:
    - python
    - pandas
    - hmmer
    - miniprot >=0.11
    - sepp
    - dendropy <4.6.0

test:
  commands:
    - compleasm --help

about:
  home: "https://github.com/huangnengCSU/compleasm"
  license: Apache-2.0
  license_file: LICENSE
  summary: "Compleasm: a faster and more accurate reimplementation of BUSCO"
  dev_url: "https://github.com/huangnengCSU/compleasm"

extra:
  recipe-maintainers:
    - huangnengCSU
