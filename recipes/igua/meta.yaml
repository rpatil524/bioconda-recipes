{% set name = "igua" %}
{% set version = "0.2.1" %}
{% set dlversion = "0.2.1" %}

package:
  name: "{{ name }}"
  version: "{{ version }}"

build:
  number: 0
  script:
    - {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --disable-pip-version-check
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
  run_exports:
    - {{ pin_subpackage(name|lower, max_pin="x.x") }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ dlversion }}.tar.gz
  sha256: 1c60f629624d0c67b7dbd14d0b38ed31dbec29729657270e6faf18a6328af0f5

requirements:
  build:
    - {{ compiler("rust") }}
    - {{ stdlib('c') }}
    - python                              # [build_platform != target_platform]
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
    - crossenv                            # [build_platform != target_platform]
    - maturin >=1.2,<2
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - maturin >=1.2,<2
  run:
    - python
    - scipy >=1.4,<2
    - gb-io >=0.3.0,<0.5.0
    - rich >=12.6,<15.0
    - numpy >=1.0,<3.0
    - pandas >=1.3,<4.0
    - anndata >=0.8,<0.13
    - biopython >=1.79,<2.0
    - mmseqs2

test:
  imports:
    - igua
  commands:
    - igua --version
    - igua --help

about:
  home: https://github.com/zellerlab/IGUA
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: 
    - COPYING
    - THIRDPARTY.yml
  summary: Iterative Gene clUster Analysis, a high-throughput method for gene cluster family identification.
  dev_url: https://github.com/zellerlab/IGUA

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
