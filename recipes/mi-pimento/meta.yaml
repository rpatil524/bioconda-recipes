{% set name = "mi-pimento" %}
{% set version = "1.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/mi_pimento-{{ version }}.tar.gz
  sha256: b3e8b495b9153b58fbbcfac054eb9259629177028fe92d6e9d3d74fba59d14fe

build:
  number: 0
  noarch: python
  entry_points:
    - pimento = pimento.pimento_cli:cli
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage('mi-pimento', max_pin="x") }}

requirements:
  host:
    - python >=3.10
    - setuptools >=61.0
    - pip
  run:
    - python >=3.10
    - biopython ==1.82
    - numpy ==1.26.0
    - pandas ==2.0.2
    - regex ==2023.12.25
    - click ==8.1.7
    - pyfastx >=2.2.0
    - rich ==13.9.4

test:
  imports:
    - pimento
  commands:
    - pimento --help

about:
  home: "https://github.com/EBI-Metagenomics/PIMENTO"
  summary: "A PrIMEr infereNce TOolkit to facilitate large-scale calling of metabarcoding amplicon sequence variants."
  description: |
    A toolkit for performing primer inference in sequencing reads.
  license: "Apache-2.0"
  license_family: APACHE
  license_file: LICENSE
  dev_url: "https://github.com/EBI-Metagenomics/PIMENTO"

extra:
  recipe-maintainers:
    - chrisAta
