{% set name = "enzywizard-mut-integrate" %}
{% set version = "1.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/bioinfbrad/enzywizard-mut-integrate/archive/refs/tags/{{ version }}.tar.gz
  sha256: 28d6013a922c70d2981edb8db46aad8fd7ae9cd1caafdee1ef91b9271ff47040

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation"
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >={{ python_min }}
    - pip
    - setuptools
    - setuptools-git-versioning >=2.0,<3
  run:
    - python >={{ python_min }}
    - biopython
    - numpy
    - packaging

test:
  imports:
    - enzywizard_mut_integrate
    - enzywizard_mut_integrate.cli
    - enzywizard_mut_integrate.services.mut_integrate_service
    - enzywizard_mut_integrate.algorithms.mut_integrate_algorithms
  commands:
    - enzywizard-mut_integrate --help
  # Note: This tool integrates JSON reports from wild-type and mutant EnzyWizard analyses.
  # It has minimal direct dependencies because it consumes outputs from other tools.

about:
  home: https://github.com/bioinfbrad/enzywizard-mut-integrate
  summary: "Command-line tool to integrate wild-type and mutant EnzyWizard JSON reports into paired protein/substrate graph representations for mutation effect analysis."
  description: |
    EnzyWizard-Mut-Integrate merges data from wild-type and mutant EnzyWizard reports
    (using an `enzywizard_mut_clean` report as anchor) into matched integrated graphs.
    It produces comprehensive JSON outputs containing substitution properties,
    comparative statistics, and paired wild-type/mutant interaction graphs (nodes + edges).
    Designed for mutation impact studies, graph-based machine learning, and enzyme engineering.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - khaled196
    - Mingkai14
