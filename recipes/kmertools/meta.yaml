{% set version = "1.0.0" %}
{% set name = "kmertools" %}
{% set sha256 = "f6db79fc584bdc5a8d9c7acccb7fac19285f3aeccbb739b929eef615efb5ba2f" %}

package:
  name: {{ name }}
  version: {{ version }}

build:
  number: 0
  skip: true  # [py < 310]
  run_exports:
    - {{ pin_subpackage('kmertools', max_pin="x.x") }}

source:
  url: https://github.com/anuradhawick/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

requirements:
  build:
    - {{ compiler("rust") }}
    - {{ stdlib("c") }}
    - cargo-bundle-licenses
    - python
  host:
    - maturin >=1.7,<2.0
    - python
    - pip
  run:
    - python

test:
  imports:
    - pykmertools
  commands:
    - {{ name }} --help

about:
  home: https://github.com/anuradhawick/kmertools
  license: GPL-3.0-only
  license_family: GPL3
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: "kmertools: DNA Vectorisation Tool"
  description: "kmertools is a k-mer based feature extraction tool designed to support metagenomics and other bioinformatics analytics."
  doc_url: https://github.com/anuradhawick/kmertools/wiki
  dev_url: https://github.com/anuradhawick/kmertools

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - anuradhawick
    - Vini2
