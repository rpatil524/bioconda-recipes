{% set version="0.26" %}
{% set name="canopy" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/hildebra/canopy2/archive/refs/tags/v{{ version }}.tar.gz
  sha256: bc1f7f5cc5deadb8789b8dc275f6023813a5ce0033ed596b98ab3bac8c4cdec0

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}
    
requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - make
    - llvm-openmp
  host:
    - zlib
  run:
    - zlib
    - llvm-openmp

test:
  commands:
    - cc.bin  --version | grep {{ version }}

about:
  home: https://github.com/hildebra/canopy2/
  license: GPL-2.0-or-later
  license_file: LICENSE
  summary: 'Canopy - Metagenomics Canopy Clustering Implementation'
