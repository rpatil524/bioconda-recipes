{% set name = "GOTTCHA2" %}
{% set version = "2.4.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install -vvv --no-deps --no-build-isolation --no-cache-dir .
  entry_points:
    - gottcha2 = gottcha.gottcha2:cli
  run_exports:
    - {{ pin_subpackage('gottcha2', max_pin='x') }}

source:
  url: https://github.com/poeli-lanl/GOTTCHA2/archive/refs/tags/{{ version }}.tar.gz
  sha256: 5046e1ebd9c8289b707e15cf8b0c9c0252a310472f24e9dd40de9ae59f0bd98a

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
    - pandas
  run:
    - python >=3.9
    - minimap2 >=2.17
    - biom-format >=2.1.7
    - numpy
    - pandas
    - requests
    - tqdm
    - pysam >=0.22.0
    - samtools
    - sylph

test:
  commands:
    - minimap2 -h
    - python -c "import gottcha.gottcha2 as g; assert g.__version__ == '{{ version }}'"
    - gottcha2 version

about:
  home: https://github.com/poeli-lanl/GOTTCHA2
  license: BSD-3
  license_family: BSD
  license_file: LICENSE
  summary: 'Genomic Origin Through Taxonomic CHAllenge (GOTTCHA) v2.'
  dev_url: https://github.com/poeli-lanl/GOTTCHA2
  doc_url: https://github.com/poeli-lanl/GOTTCHA2/wiki

extra:
  identifiers:
    - biotools:gottcha2
