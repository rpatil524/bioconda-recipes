{% set version = "2.2.10" %}

package:
  name: sopa
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/sopa/sopa-{{ version }}.tar.gz
  sha256: 191db85f91ec32f13bfa0df6cea82a511ae6554e5de313043309937570fdb69c

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  number: 0
  run_exports:
    - {{ pin_subpackage('sopa', max_pin="x") }}

requirements:
  host:
    - python >=3.11
    - hatchling
    - pip
  run:
    - python >=3.11
    - spatialdata >=0.7.2
    - spatialdata-io >=0.3.0
    - spatialdata-plot >=0.2.10
    - scanpy >=1.10.4
    - anndata >=0.11.0
    - python-igraph >=1.0.0
    - typer >=0.9.0
    - dask-core >=2024.4.1

test:
  imports:
    - sopa
  commands:
    - sopa --help

about:
  home: https://prism-oncology.github.io/sopa
  summary: Spatial-omics pipeline and analysis
  doc_url: https://prism-oncology.github.io/sopa
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - quentinblampey
