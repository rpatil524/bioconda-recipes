{% set version = "1.19.5" %}

package:
  name: nanoget
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/n/nanoget/nanoget-{{ version }}.tar.gz
  sha256: 31f4bebba409acbe8f2c3642927b59ab30b50d0a63b74a72aae5524ab85b079a

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vvv
  run_exports:
    - {{ pin_subpackage('nanoget', max_pin="x") }}

requirements:
  host:
    - python >=3.0
    - pip
    - setuptools
  run:
    - python >=3.0
    - pandas >=2.0.0
    - numpy
    - biopython
    - pysam >0.10.0

test:
  imports:
    - nanoget

about:
  home: https://github.com/wdecoster/nanoget
  license: GPL-3.0-only
  summary: 'Functions to extract information from Oxford Nanopore sequencing data and alignments.'
  license_family: GPL
  license_file: LICENSE
