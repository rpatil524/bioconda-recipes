{% set version = "0.3.2" %}
{% set github = "https://github.com/acidgenomics/r-acidmarkdown" %}

package:
  name: r-acidmarkdown
  version: "{{ version }}"

source:
  url: "{{ github }}/archive/v{{ version }}.tar.gz"
  sha256: 3061a4652640eed8f48adaf8dfb51aa5d2c3eff93876a6a9de2ca8720b2333a4

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('r-acidmarkdown', max_pin="x.x") }}

requirements:
  host:
    # Depends:
    - r-base
    # Imports:
    - r-acidgenerics
    - r-goalie
    # Suggests:
    - r-knitr
  run:
    # Depends:
    - r-base
    # Imports:
    - r-acidgenerics
    - r-goalie
    # Suggests:
    - r-knitr

test:
  commands:
    - $R -e "library('AcidMarkdown')"

about:
  home: https://r.acidgenomics.com/packages/acidmarkdown/
  dev_url: "{{ github }}"
  license: Apache-2.0
  license_file: LICENSE.md
  license_family: APACHE
  summary: Toolkit for extending the functionality of R Markdown.

extra:
  recipe-maintainers:
    - acidgenomics
    - mjsteinbaugh
