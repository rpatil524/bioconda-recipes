{% set name = "gxfkit" %}
{% set version = "0.0.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/benngaihk/gxfkit/archive/refs/tags/v{{ version }}.tar.gz
  sha256: b5cc0313f02ca4e31f6d223c6a551e9b753705da0f7f186a98869ec3ed819ed5

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - cargo-bundle-licenses

test:
  commands:
    - gxfkit version
    - gxfkit gff2gtf --help

about:
  home: https://github.com/benngaihk/gxfkit
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Fast Rust reimplementation of AGAT GFF/GTF operations

extra:
  recipe-maintainers:
    - benngaihk
