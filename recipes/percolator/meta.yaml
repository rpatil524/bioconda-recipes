{% set name = "percolator" %}
{% set version = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/percolator/percolator/archive/refs/tags/rel-3-09.tar.gz
  sha256: 2caed6362638f401a1527b09dcb2888320dab10fe003f76f584cfd395ed30f73

build:
  number: 0
  skip: True  # [osx]
  run_exports:
    - {{ pin_subpackage('percolator', max_pin="x") }}

requirements:
  build:
    - make
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
  host:
    - boost-cpp
    - sqlite
    - bzip2
    - zlib
  run:
    - boost-cpp
    - sqlite
    - zlib

test:
  commands:
    - percolator $PREFIX/testdata/percolatorTab > /dev/null

about:
  home: "https://github.com/percolator/percolator"
  license: Apache-2.0
  license_family: APACHE
  license_file: "license.txt"
  summary: "Semi-supervised learning for peptide identification from shotgun proteomics datasets."
  dev_url: "https://github.com/percolator/percolator"
  doc_url: "http://percolator.ms"

extra:
  additional-platforms:
    - linux-aarch64
  identifiers:
    - biotools:Percolator
    - doi:10.1007/s13361-016-1460-7
    - usegalaxy-eu:percolator
