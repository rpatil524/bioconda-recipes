{% set name = "isiteuk" %}
{% set version = "0.0.2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: b788007493a8241dab9677eeb52ca86105e2352bf56896e5cb6922f7c4290ca5

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage('isiteuk', max_pin="x.x") }}

requirements:
  host:
    - python >=3.7
    - pip
    - setuptools
  run:
    - python >=3.7, <3.12
    - singlem >=0.18.0
    - polars >1.0.0
    - diamond >=2.1.21
    - zenodo_backpack >=0.3

test:
  imports:
    - isiteuk
  commands:
    - isiteuk --version
    - isiteuk --help

about:
  home: "https://github.com/wwood/isiteuk"
  summary: Domain classification of genomes using SingleM marker genes
  description: |
    isiteuk classifies genomes by domain (Bacteria, Archaea, Eukaryota) using
    SingleM marker genes.
  license: GPL-3.0-or-later
  license_family: "GPL3"
  license_file: LICENCE.txt
  dev_url: "https://github.com/wwood/isiteuk"
