{% set name = "pydustmasker" %}
{% set version = "3.1.0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: a8817ddf94994e3b83f8e1946c8bee4659d1d8ac0c4b7160041e19e0d58adab0

build:
  number: 0
  skip: True  # [py<310]
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}
  script:
    - {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --disable-pip-version-check -vvv
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

requirements:
  build:
    - python                              # [build_platform != target_platform]
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
    - crossenv                            # [build_platform != target_platform]
    - maturin >=1.5,<2                    # [build_platform != target_platform]
    - {{ compiler("c") }}
    - {{ compiler("rust") }}
    - {{ stdlib("c") }}
    - cargo-bundle-licenses
  host:
    - python
    - pip
    - maturin >=1.10,<2
  run:
    - python

test:
  imports:
    - pydustmasker

about:
  home: https://apcamargo.github.io/pydustmasker
  dev_url: https://github.com/apcamargo/pydustmasker
  doc_url: https://apcamargo.github.io/pydustmasker
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: >
    Python library for identification and masking of low-complexity regions in
    nucleotide sequences.

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - version_constraints_missing_whitespace  # see https://github.com/bioconda/bioconda-recipes/issues/51185
