{% set name = "nwkit" %}
{% set version = "0.27.0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: https://github.com/kfuku52/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 3d147b3c6471a481ff97658057e72d5eb6f865fdd5c3c18a4188d612d040ca2f

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-build-isolation --no-deps -vv"
  run_exports:
    - {{ pin_subpackage("nwkit", max_pin="x.x") }}

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=77.0.3
    - wheel
  run:
    - python >=3.10
    - ete4 >=4.4.0
    - biopython
    - pandas
    - requests
    - numpy
    - scipy
    - matplotlib-base

test:
  commands:
    - nwkit --help
    - nwkit --version
    - python -m nwkit --version
    - printf '(A:1,B:1);' | nwkit validate --fail-on-issue yes > /dev/null
  imports:
    - nwkit

about:
  home: "https://github.com/kfuku52/nwkit"
  license: "MIT"
  license_file:
    - LICENSE
    - THIRD_PARTY_NOTICES
  summary: "Tools for processing newick trees"

extra:
  recipe-maintainers:
    - kfuku52
