{% set name = "Discount" %}
{% set version = "4.0.0" %}
{% set sha256 = "0deb13e63c679ca13e57a5667ecfa1bd27715f1b912e7139ece88eaaa0291471" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/jtnystrom/Discount/releases/download/v{{ version }}/Discount-{{ version }}_Spark3.5.zip
  sha256: {{ sha256 }}

build:
  noarch: generic
  number: 1
  run_exports:
    - {{ pin_subpackage("discount", max_pin="x") }}

requirements:
  run:
    - openjdk >=17, <22
    - pyspark >=3.5.0, <4.0.0

test:
  commands:
    - discount.sh -h

about:
  home: https://github.com/jtnystrom/Discount
  license: GPL-3.0-only
  license_file: LICENSE.txt
  license_family: GPL3
  summary: Discount is a very scalable k-mer counting and indexing tool based on Apache Spark.
  dev_url: https://github.com/jtnystrom/Discount
  doc_url: https://github.com/jtnystrom/Discount/blob/v{{ version }}/README.md

extra:
  identifiers: 
    - doi:10.1093/bioinformatics/btab156
  recipe-maintainers:
    - jtnystrom
