{% set name = "omark" %}
{% set version = "0.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/omark-{{ version }}.tar.gz
  sha256: 4b2b9eb01be2e53853b33a72cd4b14a1e5b47b1c5f5ca732dd391a4048462c73

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}
  noarch: python

requirements:
  host:
    - python >=3.9,<3.13
    - pip
    - uv-build
  run:
    - python >=3.9,<3.13
    - biopython >1.83
    - ete3
    - libsqlite <=3.40.0 # Workaround (https://github.com/etetoolkit/ete/pull/770)
    - omamer >=2.1.0
    - matplotlib-base
    - jinja2

test:
  imports:
    - omark
  commands:
    - omark -h

about:
  home: https://github.com/DessimozLab/omark
  summary: OMArk - Proteome quality assesment based on OMAmer placements
  license: LGPL-3.0
  license_file:
    - LICENSE
    - COPYING.LESSER
    - COPYING

extra:
  recipe-maintainers:
    - alpae
  identifiers:
    - doi:10.1101/2022.11.25.517970
