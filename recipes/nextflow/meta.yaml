{% set version = "26.04.6" %}
{% set sha256 = "61a755edbed743cfbb568f3a6c67af68481a2f6a4d6dffcc4295e51318968281" %}

package:
  name: nextflow
  version: {{ version }}

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('nextflow', max_pin="x.x") }}

source:
  url: https://github.com/nextflow-io/nextflow/releases/download/v{{ version }}/nextflow
  sha256: {{ sha256 }}

requirements:
  host:
    - openjdk >=17,<=24
    - coreutils          # [not win]
    - uutils-coreutils   # [win]
    - curl
  run:
    - openjdk >=17,<=24
    - coreutils          # [not win]
    - uutils-coreutils   # [win]
    - curl

test:
  commands:
    - nextflow help

about:
  home: "https://github.com/nextflow-io/nextflow"
  license: "Apache-2.0"
  summary: "A DSL for data-driven computational pipelines http://nextflow.io"

extra:
  recipe-maintainers:
    - pditommaso
    - bentsherman
    - ewels
    - mjsteinbaugh
