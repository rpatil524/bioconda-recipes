{% set name = "enzywizard-interaction" %}
{% set version = "1.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/bioinfbrad/enzywizard-interaction/archive/refs/tags/{{ version }}.tar.gz
  sha256: 395008e554e146a0650782676d0dee2e283578df41db58fcb3f91897d8db15ef

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation"
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >={{ python_min }}
    - pip
    - setuptools
    - setuptools-git-versioning >=2.0,<3
  run:
    - python >={{ python_min }}
    - rdkit
    - biopython
    - numpy
    - scipy
    - openmm

test:
  imports:
    - enzywizard_interaction
    - enzywizard_interaction.cli
    - enzywizard_interaction.services.interaction_service
    - enzywizard_interaction.algorithms.interaction_algorithms
  commands:
    - enzywizard-interaction --help
  # Note: Detects protein-protein and protein-substrate interactions (HBOND, IONIC, VDW, PIPISTACK, PICATION, SSBOND)
  # using geometric criteria. Requires cleaned protein structure + optional docked SDF substrates.

about:
  home: https://github.com/bioinfbrad/enzywizard-interaction
  summary: "Command-line tool to detect molecular interactions (hydrogen bonds, ionic, van der Waals, pi-stacking, pi-cation, disulfide) in protein and protein-substrate systems and generate a detailed JSON report."
  description: |
    EnzyWizard-Interaction identifies six types of molecular interactions in cleaned
    protein structures (with optional docked substrates in SDF format) using
    geometric criteria inspired by the RING4 method. It supports efficient
    vectorized calculations and KD-tree neighbor searching. Outputs a comprehensive
    JSON report with interaction records and statistics, suitable for graph-based
    analysis and enzyme-substrate studies.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - khaled196
    - Mingkai14
