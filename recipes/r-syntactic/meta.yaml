{% set version = "0.8.1" %}
{% set github = "https://github.com/acidgenomics/r-syntactic" %}

package:
  name: r-syntactic
  version: "{{ version }}"

source:
  url: "{{ github }}/archive/v{{ version }}.tar.gz"
  sha256: c01908e50090d23972a2b8b65e6cbda1248bac55d56e8ea03c583bf79b987ee3

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage('r-syntactic', max_pin="x.x") }}

requirements:
  host:
    # Depends:
    - r-base
    # Imports:
    - r-acidgenerics >=0.7.0
    - r-goalie >=0.7.0
    # Suggests:
    - r-stringi >=1.7.12
  run:
    # Depends:
    - r-base
    # Imports:
    - r-acidgenerics >=0.7.0
    - r-goalie >=0.7.0
    # Suggests:
    - r-stringi >=1.7.12

test:
  commands:
    - $R -e "library('syntactic')"

about:
  home: https://r.acidgenomics.com/packages/syntactic/
  dev_url: "{{ github }}"
  license: Apache-2.0
  license_file: LICENSE.md
  license_family: APACHE
  summary: Make syntactically valid names out of character vectors.

extra:
  recipe-maintainers:
    - acidgenomics
    - mjsteinbaugh
