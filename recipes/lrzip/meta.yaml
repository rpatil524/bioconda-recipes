{% set name = "lrzip" %}
{% set version = "0.651" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: http://ck.kolivas.org/apps/{{ name }}/{{ name }}-{{ version }}.tar.xz
  sha256: 48bd8decb097c1596c9b3777959cd3e332819434ed77a2823e65aa436f1602f9

build:
  number: 2
  skip: True # [osx]
  run_exports:
    - {{ pin_subpackage('lrzip', max_pin="x.x") }}

requirements:
  build:
    - autoconf
    - automake
    - libtool
    - make
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
  host:
    - zlib
    - bzip2
    - lzo
    - lz4-c
  run:
    - bzip2
    - zlib
    - lzo
    - lz4-c

test:
  commands:
    - lrzip --version

about:
  home: https://github.com/ckolivas/lrzip
  license: GPLv2
  license_file: COPYING
  summary: Long Range ZIP or Lzma RZIP, a compression program optimised for large files.

extra:
  additional-platforms:
    - linux-aarch64
