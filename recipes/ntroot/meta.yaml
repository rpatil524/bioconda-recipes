{% set name = "ntRoot" %}
{% set version = "1.2.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/BirolLab/ntRoot/releases/download/v{{ version }}/{{ name }}-{{ version }}.tar.gz
  sha256: 64ba3a50722c6dee608c65ccecedb0288b80750fb7cd0b8e9408338290494a3f

build:
  number: 0
  noarch: generic
  run_exports: 
    - {{ pin_subpackage("ntroot", max_pin="x") }}

requirements:
  host:
    - perl
  run:
    - python <3.13
    - snakemake
    - samtools
    - ntedit >=2.0.2
    - perl
    - bedtools
    - plotly
    - pandas

test:
  commands:
    - ntroot -h

about:
  home: https://github.com/BirolLab/ntroot
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: 'Ancestry inference from genomic data'
