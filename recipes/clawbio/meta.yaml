{% set version = "0.5.2" %}

package:
  name: clawbio
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/clawbio/clawbio-{{ version }}.tar.gz
  sha256: 673d8d905ec39d47adf3c721cf1a69cf4fb6f4da23dbb6cf24108f15f6262cf9

build:
  entry_points:
    - clawbio = clawbio.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage('clawbio', max_pin="x.x") }}

requirements:
  host:
    - python >=3.11
    - hatchling
    - pip
  run:
    - python >=3.11
    - biopython >=1.82
    - conda-lock >=2.0
    - google-auth >=2,<3
    - google-cloud-bigquery-core >=3,<4
    - matplotlib-base >=3.7
    - numpy >=1.24
    - openai >=1.0
    - opentelemetry-sdk >=1.20,<2
    - pandas >=2.0
    - pyyaml >=6.0
    - pydeseq2 >=0.4
    - rocrate >=0.15.0
    - scikit-learn >=1.3

test:
  imports:
    - clawbio
  commands:
    - pip check
    - clawbio --help
  requires:
    - pip
    - python

about:
  home: https://clawbio.ai
  summary: The first bioinformatics-native AI agent skill library. Local-first, reproducible, built on OpenClaw.
  doc_url: https://clawbio.github.io/ClawBio/
  license: MIT
  license_file:
    - LICENSE
    - skills/eqtl-catalogue-region-fetch/LICENSE
    - skills/gwas-catalog-region-fetch/LICENSE
    - skills/ld-1000g-region-compute/LICENSE
    - skills/ukb-ppp-region-fetch/LICENSE
    - skills/locuscompare-region-render/LICENSE

extra:
  recipe-maintainers:
    - camlloyd
