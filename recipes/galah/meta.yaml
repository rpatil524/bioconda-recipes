{% set version = "0.5.2" %}
{% set name = "galah" %}
{% set sha256 = "f420c526b4b4e2942e18d0de93f7f7ce591656a4cc0656af5c69621ad000bce2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/wwood/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - cargo-bundle-licenses
    - pkg-config
  run:
    - skani >=0.2.2
    - fastani >=1.34
    - barrnap >=0.9
    - trnascan-se >=2.0.12
    - checkm2 >=1.1.0

test:
  commands:
    - {{ name }} --version | grep '{{ version }}'

about:
  home: "https://github.com/wwood/galah"
  license: "GPL-3.0-only"
  license_family: GPL3
  license_file:
    - LICENCE.txt
    - THIRDPARTY.yml
  summary: "Galah aims to be a more scalable metagenome assembled genome (MAG) dereplication method."
  dev_url: "https://github.com/wwood/galah"
  doc_url: "https://wwood.github.io/galah/"

extra:
  additional-platforms:
    - osx-arm64
  skip-lints:
    - uses_vcs_url
