{% set version = "1.2.3" %}

package:
  name: dnaio
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/dnaio/dnaio-{{ version }}.tar.gz
  sha256: aad456d9f6272339958b2c5af32fd64d77a50aca12e394e7a143b4129d49b0b9

build:
  number: 1
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  run_exports:
    - {{ pin_subpackage('dnaio', max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - pip
    - python
    - cython
    - setuptools-scm
  run:
    - python
    - xopen >=1.4.0

test:
  imports:
    - dnaio

about:
  home: https://github.com/marcelm/dnaio/
  license: MIT
  summary: 'Read and write FASTA and FASTQ files efficiently'

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - marcelm
