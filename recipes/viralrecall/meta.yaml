{% set name = "viralrecall" %}
{% set version = "3.1.0" %}

package:
  name: {{ name | lower }}
  version: {{ version }}

source:
  url : https://github.com/abdealijivaji/ViralRecall/archive/refs/tags/v{{ version }}.tar.gz
  sha256 : 7836797dcaf1370b9867a5aa5892c3066fe94cac5da8a4ca8a933bae4aa48151

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv"
  run_exports :
    - {{ pin_subpackage(name , max_pin="x.x") }}

requirements:
  host:
    - python >=3.10,<3.14
    - pip
    - setuptools
  run:
    - python >=3.10,<3.14
    - numpy >=2.2,<2.3
    - pandas >=2.2,<2.3
    - matplotlib-base >=3.10,<3.11
    - requests >=2.32,<2.33
    - progressbar >=2.5
    - pyfaidx ==0.9.0
    - pyhmmer >=0.11.3 
    - pyrodigal-gv >=0.3
    - scikit-learn ==1.8.*
    - joblib ==1.5.*

about:
  home: "https://github.com/abdealijivaji/ViralRecall"
  license: "MIT"
  license_file: LICENSE
  summary: "Tool to identify giant viruses integrated into eukaryotic genomes"
  license_family: "MIT"

extra:
  recipe-maintainers:
    - abdealijivaji

test:
  imports:
    - viralrecall
  commands:
    - viralrecall --version

