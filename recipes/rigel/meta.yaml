{% set name = "rigel" %}
{% set version = "0.7.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/r/rigel-rnaseq/rigel_rnaseq-{{ version }}.tar.gz
  sha256: 55f33b3324556940f91711b4cf572247168bd585a2c31c9f53e04f8c06ede25b

build:
  number: 0
  skip: true  # [py < 312]
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake >=3.15
    - make
    - pkg-config
  host:
    - python
    - pip
    - scikit-build-core >=0.4.3
    - nanobind >=2.0
    - htslib
    - zlib
    - libcurl
    - openssl
    - bzip2
    - xz
    - libdeflate
    - numpy >=1.26
  run:
    - python >=3.12
    - numpy >=1.26
    - pandas >=2.1
    - pyarrow >=14.0
    - pysam >=0.22
    - pyyaml >=6.0
    - scipy >=1.11

test:
  imports:
    - rigel
  commands:
    - rigel --help

about:
  home: https://github.com/mkiyer/rigel
  license: GPL-3.0-or-later
  license_family: GPL3
  summary: Bayesian RNA-seq transcript quantification tool
  dev_url: https://github.com/mkiyer/rigel

extra:
  recipe-maintainers:
    - mkiyer
