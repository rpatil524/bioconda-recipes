{% set name = "fqtk" %}
{% set version = "0.4.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/fulcrumgenomics/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: 9e4d1bc7edd2211db2c5831ecc21b8e92c6e5c93dc99f29be8a01bc83f608040

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('fqtk', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - {{ compiler('rust') }}
    - pkg-config
    - make
    - cmake
    - cargo-bundle-licenses

test:
  commands:
    - fqtk --help

about:
  home: "https://github.com/fulcrumgenomics/{{ name }}"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "A toolkit for working with FASTQ files."
  dev_url: "https://github.com/fulcrumgenomics/{{ name }}"
  doc_url: "https://github.com/fulcrumgenomics/fqtk/blob/v{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - nh13
    - tfenne
  identifiers:
    - DOI:10.5281/zenodo.13345414
