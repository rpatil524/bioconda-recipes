{% set name = "enzywizard-mut-batch" %}
{% set version = "1.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/bioinfbrad/enzywizard-mut-batch/archive/refs/tags/{{ version }}.tar.gz
  sha256: 60a4ad77d148c87af9ae8c9db3c7649b08eae791c84cf5171f1171626df03ecf

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation"
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >={{ python_min }}
    - pip
    - setuptools
    - setuptools-git-versioning >=2.0,<3
  run:
    - python >={{ python_min }}
    - biopython
    - numpy
    - rdkit
    - openmm
    - prody
    - fair-esm
    - bio-pyvol
    - meeko
    - pdbfixer
    - requests
    - packaging
    # External binaries required by dependencies or modules:
    - hmmer          # for conservation analysis
    - dssp           # for secondary structure (via Biopython)
    - vina           # for docking (AutoDock Vina)

test:
  imports:
    - enzywizard_mut_batch
    - enzywizard_mut_batch.cli
  commands:
    - enzywizard-mut-batch --help
    - vina --help
    - hmmbuild -h
  # Note: This is the paired wild-type/mutant version of enzywizard-batch.
  # It requires a large set of dependencies. Some packages (pdbfixer, meeko, fair-esm)
  # may need separate conda recipes.

about:
  home: https://github.com/bioinfbrad/enzywizard-mut-batch
  summary: "Command-line meta-workflow tool that runs paired EnzyWizard analysis on a wild-type protein and its mutant (including properties, clusters, energy, flexibility, disorder, conservation, embeddings, pockets, docking, interactions) and produces a mutation-aware integrated graph JSON dataset."
  description: |
    EnzyWizard-Mut-Batch executes the full EnzyWizard pipeline on paired wild-type
    and mutant protein structures (with matched MSAs). It performs residue properties,
    hydrophobic clustering, energy evaluation, flexibility (ANM/GNM), disorder prediction,
    conservation (HMMER), ESM-2 embeddings, pocket detection (PyVOL), optional substrate
    preparation + AutoDock Vina docking, molecular interaction detection, and mutation-aware
    graph integration. Outputs paired integrated graph JSON files ready for mutation
    effect analysis and machine learning.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - khaled196
    - Mingkai14
