{% set name = "superintervals" %}
{% set version = "1.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/kcleal/superintervals/archive/v{{ version }}.tar.gz
  sha256: dad2ca88ab0524a273edabf2b7a47740cb014a95d4bf7a5b4f3262b5a198d617

build:
  number: 0
  script:
    - sed -i.bak 's|find_packages|find_namespace_packages|' setup.py
    - rm -rf *.bak
    - {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage('superintervals', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - python
    - pip
    - setuptools >=42
    - cython
  run:
    - python

test:
  imports:
    - superintervals

about:
  home: "https://github.com/kcleal/superintervals"
  summary: "Rapid interval intersections."
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: "https://github.com/kcleal/superintervals"

extra:
  recipe-maintainers:
    - kcleal
  additional-platforms:
    - linux-aarch64
    - osx-arm64
