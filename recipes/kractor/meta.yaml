{% set version = "5.0.0" %}
{% set name = "kractor" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/sam-sims/{{ name }}/archive/{{ name }}-{{ version }}.tar.gz
  sha256: f4994ce915eefd49c176b0752480bf7f72e21db4657bc486472471e4d2dcf0fa

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('kractor', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ stdlib('c') }}
    - cargo-bundle-licenses

test:
  commands:
    - kractor --version

about:
  home: https://github.com/Sam-Sims/kractor
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Rapidly extract reads from a FASTQ file based on taxonomic classification via Kraken2.

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - sam-sims
