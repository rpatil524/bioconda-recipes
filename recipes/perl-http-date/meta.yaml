{% set name = "perl-http-date" %}
{% set version = "6.08" %}
{% set sha256 = "b57d80ca6d821c6949ca48b27467d45aba7a9c77346562306facca781a003e44" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/O/OA/OALDERS/HTTP-Date-6.08.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - make
  host:
    - perl 
    - perl-time-local >=1.28
    - perl-timedate
    - perl-extutils-makemaker
    - perl-file-spec 
    - perl-io-handle
    - perl-test-more 
  run:
    - perl
    - perl-exporter 
    - perl-time-local >=1.28
    - perl-timedate

test:
  imports:
    - HTTP::Date

about:
  home: http://metacpan.org/pod/HTTP::Date
  license: perl_5
  summary: 'date conversion routines'
