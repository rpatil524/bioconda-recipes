{% set name = "taxutils" %}
{% set version = "1.0.0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: 77194e7c98c740e4a004fd066e231d54426b41d2622803babc25a72ee6214fae

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vvv"
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=3.10
    - numpy
    - pandas

test:
  imports:
    - taxutils

about:
  home: https://github.com/SwabSeq/taxutils
  license: MIT
  license_file: LICENSE
  summary: "Utilities for working with NCBI taxonomic data."

extra:
  recipe-maintainers:
    - "wgobrien"
  authors:
    - "William O'Brien"
