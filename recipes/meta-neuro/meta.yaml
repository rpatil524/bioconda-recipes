{% set name = "meta-neuro" %}
{% set version = "2.1.0" %}
{% set sha256 = "7352199fa7d65873004b55b0978fbff4597ac6f2490c6edce4dafa5292f4aee5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/bagari/meta/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}
  script: "{{ PYTHON }} -m pip install . --no-deps -vv"

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools >=77.0.3
  run:
    - python >=3.11
    - numpy
    - tqdm
    - dipy
    - scipy
    - pandas
    - nibabel
    - tslearn
    - pyvista
    - trx-python
    - pytables

test:
  imports:
    - meta
  requires:
    - pip
  commands:
    - pip check
    - meta --help
    - density_map --help
    - shape_metrics --help
    - volumetric_profile --help
    - streamlines_profile --help
    - compute_bundle_similarity --help
    - apply_transform_image --help
    - apply_transform_tractogram --help

about:
  home: https://github.com/bagari/meta
  license: MIT
  license_file: LICENSE.txt
  summary: 'Medial Tractography Analysis (MeTA)'
  description: |
    MeTA is a workflow implemented to minimize microstructural heterogeneity in diffusion MRI (dMRI) metrics by extracting and parcellating the core volume along the bundle length in the voxel-space directly while effectively preserving bundle shape and efficiently capturing the regional variation within and along white matter (WM) bundles.

extra:
  recipe-maintainers:
    - bagari
