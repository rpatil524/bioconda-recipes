{% set name = "nucflag" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/nucflag-{{ version }}.tar.gz
  sha256: b248550ae5ddcd908a1b915b42229dbca33a622a34b6c091144e190aa8716c87

build:
  entry_points:
    - nucflag = nucflag.main:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin='x.x') }}

requirements:
  host:
    - python >=3.11
    - setuptools
    - pip
  run:
    - python >=3.11
    - matplotlib-base >=3.8.3
    - numpy >=1.26.4
    - polars >=1.6.0
    - intervaltree >=3.1.0
    - py_nucflag >=0.1.9
    - pybigwig >=0.3.24
    - pyideogram >=0.1.0

test:
  imports:
    - nucflag
  commands:
    - pip check
    - nucflag --help
  requires:
    - pip
    - python

about:
  home: https://github.com/logsdon-lab/NucFlag
  summary: NucFlag misassembly identifier.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - koisland
