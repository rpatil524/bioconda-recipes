{% set version = "0.6.0" %}
{% set name = "myloasm" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/bluenote-1577/myloasm/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 9e5949991d7116c71b686da449fb71f5eeb450db759e0b29a12551c3cb233258

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler("cxx") }}
    - {{ compiler("rust") }}
    - cargo-bundle-licenses
    - make
    - cmake >=3.5
    - pkg-config
    - zlib
  host:
    - zlib

test:
  commands:
    - myloasm --help

about:
  home: "https://github.com/bluenote-1577/myloasm"
  license: MIT
  license_family: MIT
  summary: "myloasm - high-resolution metagenome assembly for (noisy) long reads."
  license_file: LICENSE
  dev_url: "https://github.com/bluenote-1577/myloasm"
  doc_url: "https://myloasm-docs.github.io"

extra:
  recipe-maintainers:
    - bluenote-1577
  additional-platforms:
    #- linux-aarch64
    - osx-arm64
  skip-lints:
    - compiler_needs_stdlib_c
