{% set name = "NgsRelate" %}
{% set version = "2.3.1" %}
{% set sha256 = "f3cf1c88f8f8855c60fc72f891eaa3c5ca32961f8ec41a473669cf0b0971f3ff" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/ANGSD/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name|lower, max_pin='x') }}

requirements:
  build:
    - make
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
  host:
    - htslib
    - zlib

test:
  commands:
    - ngsRelate 2>&1 | grep -E "Version:|NgsRelate version:"

about:
  home: https://github.com/ANGSD/NgsRelate
  license: GPL-2.0-only
  license_family: GPL
  license_file: LICENSE
  summary: "Software tool for estimating pairwise relatedness from next-generation sequencing data."
  dev_url: https://github.com/ANGSD/NgsRelate

extra:
  identifiers:
    - doi:10.1093/bioinformatics/btv509
    - doi:10.1093/gigascience/giz034
