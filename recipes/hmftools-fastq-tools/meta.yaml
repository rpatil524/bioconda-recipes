{% set version = "1.0" %}
{% set sha256 = "e89d0c46466cade0cd658ca2666b534f61378527129bc81f0cb5fc14a4115867" %}

package:
  name: hmftools-fastq-tools
  version: '{{ version }}'

source:
  url: https://github.com/hartwigmedical/hmftools/releases/download/fastq-tools-v{{ version }}/fastq-tools_v{{ version }}.jar
  sha256: '{{ sha256 }}'

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage("hmftools-fastq-tools", max_pin="x.x") }}

requirements:
  run:
    - openjdk >=8,<=21

test:
  commands:
    - 'fastq-tools -version'

about:
  home: https://github.com/hartwigmedical/hmftools/blob/master/fastq-tools/README.md
  license: GPL-3.0-only
  license_family: GPL3
  summary: Rapidly process FASTQs for various tasks.
