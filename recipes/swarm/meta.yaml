{% set name = "swarm" %}
{% set version = "3.1.7" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/torognes/swarm/archive/v{{ version }}.tar.gz
  sha256: 634f21ec87be14698fcc1d7d75e456dc8e448713c5446c2ce6873488f329f062

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - make
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
  run:
    - python >=3
    - python-igraph

test:
  commands:
    - swarm -v
    - graph_plot.py --version

about:
  home: "https://github.com/torognes/swarm"
  license: "AGPL-3.0-or-later"
  license_file: LICENSE
  license_family: AGPL
  summary: "A robust and fast clustering method for amplicon-based studies."
  dev_url: "https://github.com/torognes/swarm"
  doc_url: "https://github.com/torognes/swarm/blob/v{{ version }}/man/swarm_manual.pdf"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - biotools:swarm
    - doi:10.7717/peerj.593
