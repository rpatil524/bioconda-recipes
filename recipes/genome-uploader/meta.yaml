{% set name = "genome-uploader" %}
{% set version = "3.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/EBI-Metagenomics/genome_uploader/archive/v{{ version }}.tar.gz
  sha256: c1981e19565e024f11a8beafe1d0860b2c341c258b75fb481ba803dde0b9727e

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage('genome-uploader', max_pin="x") }}

requirements:
  host:
    - python >=3.9
    - setuptools >=61.0.0
    - pip
  run:
    - python >=3.9
    - requests >=2.26,<3
    - pandas >=2.0.2
    - python-dotenv >=1.0
    - numpy ==1.26.0
    - click >=8.1.8,<9
    - mgnify-pipelines-toolkit >=1.4.22
    - ena-webin-cli >=9.0.1
    - retry >=0.9.2

test:
  imports:
    - genomeuploader
  commands:
    - genome_upload --help
    - webin_cli_handler --help

about:
  home: "https://github.com/EBI-Metagenomics/genome_uploader"
  summary: "Python script to upload bins and MAGs in fasta format to ENA (European Nucleotide Archive)."
  license: "Apache-2.0"
  license_family: APACHE
  license_file: "LICENSE.md"
  dev_url: "https://github.com/EBI-Metagenomics/genome_uploader"

extra:
  recipe-maintainers:
    - Ge94
    - KateSakharova
