{% set name = "fxsplit" %}
{% set version = "0.0.4" %}

package:
 name: {{ name }}
 version: {{ version }}

source:
 url: https://github.com/alejandrogzi/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
 sha256: 52b6f71fd5540aebd4fbfcaab18130b72fab6fcb6c17b0cedf4878b7262e173d

build:
 number: 0
 run_exports:
    - {{ pin_subpackage('fxsplit', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler("cxx") }}
    - {{ compiler("rust") }}
    - {{ stdlib("c") }}
    - cargo-bundle-licenses
    - pkg-config

test:
 commands:
   - fxsplit --help
   - fxsplit --version

about:
 home: "https://github.com/alejandrogzi/fxsplit"
 license: "Apache-2.0"
 license_family: APACHE
 summary: "split FASTX (and 2bit) into N chunks/files/headers"
 dev_url: "https://github.com/alejandrogzi/fxsplit"

extra:
  recipe-maintainers:
    - alejandrogzi
  additional-platforms:
    - linux-aarch64
    - osx-arm64
