{% set name = "panacus" %}
{% set version = "0.5.1" %}

package:
  name: {{ name|lower }}
  version: {{ version | replace('-', '.') }}

source:
  url: https://github.com/codialab/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 59f1427b077d4d71fc9a5de37218245692ff8ef78d801e99a520555c54f7cdd6

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}


requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - cmake
    - make
  run:
    - python
    - matplotlib-base
    - numpy
    - pandas
    - scikit-learn
    - scipy
    - seaborn-base

test:
  commands:
    - panacus --help
    - panacus-visualize --help

about:
  home: https://github.com/codialab/{{ name }}
  license: MIT
  license_family: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: "panacus is a tool for computing counting statistics for GFA files."
  dev_url: https://github.com/codialab/{{ name }}

extra:
  additional-platforms:
    - osx-arm64
    - linux-aarch64
  recipe-maintainers:
    - danydoerr
    - heringerp
  skip-lints:
    - compiler_needs_stdlib_c
