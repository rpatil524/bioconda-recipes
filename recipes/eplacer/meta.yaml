package:
  name: eplacer
  version: 0.1.1

source:
  url: https://files.pythonhosted.org/packages/b1/b8/dda3f5e24fafa4424fb65abc0f4155fe03177984d24211a1e61d7c53ed84/eplacer-0.1.1.tar.gz
  sha256: 159d6d8bbec174203651212efcfce597665579636f52f2cfff49d87d18b1aac1

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - eplacer = eplacer.__main__:main
  run_exports:
    - {{ pin_subpackage('eplacer', max_pin="x.x") }}
    
requirements:
  host:
    - python >=3.12
    - pip
    - setuptools
  run:
    - python >=3.12
    - pytorch >=2.5
    - torchvision
    - torchinfo
    - blast >=2.16
    - mafft
    - trimal
    - entrez-direct
    - ncbi-acc-download
    - numpy
    - pandas
    - scipy
    - scikit-learn
    - networkx
    - shapely
    - sympy
    - tqdm
    - pyyaml
    - requests
    - click
    - docopt
    - pygeohash

test:
  imports:
    - eplacer
  commands:
    - eplacer --help

about:
  home: https://github.com/NEFSC/PEMAD-PBB-ePlacer
  license: Public Domain
  license_file: LICENSE.txt
  summary: 'A deep learning approach to taxonomic assignment'

extra:
  recipe-maintainers:
    - ccpowers-NOAA