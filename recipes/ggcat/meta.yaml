{% set name = "ggcat" %}
{% set version = "2.2.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/algbio/ggcat/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 4432dacfbab4817f410ebbc74ccea576c3291fdc4e764b2769d81b3fe1929b2e

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('ggcat', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - cargo-bundle-licenses
    - pkg-config
  host:
    - zlib

test:
  commands:
    - ggcat --help

about:
  home: "https://github.com/algbio/ggcat"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Compacted and colored de Bruijn graph construction and querying."
  dev_url: "https://github.com/algbio/ggcat"
  doc_url: "https://github.com/algbio/ggcat/blob/v{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - guilucand
  identifiers:
    - doi:10.1101/gr.277615.122
