{% set name = "telescope" %}
{% set version = "1.0.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/hanalysis/telescope/archive/v{{ version }}.tar.gz
  sha256: 02d4466223ad5898c0891078269fb798047885d7f8489e6e84f6d73b07566e83
#  patches:
#   - 0001-Fix-setup.py.patch

build:
  number: 0
  skip: True  # [py < 30]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin=None) }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - pip
    - python ==3.6
    - cython ==0.29.7
    - setuptools <60
    - numpy ==1.16.3
    - scipy ==1.2.1
    - pysam ==0.15.2
    - future >=0.17.1
    - pyyaml >=5.1
    - intervaltree ==3.0.2
    - htslib ==1.9
    - pandas ==1.1.3
  run:
    - python ==3.6
    - numpy ==1.16.3
    - scipy ==1.2.1
    - pysam ==0.15.2
    - future >=0.17.1
    - pyyaml >=5.1
    - intervaltree ==3.0.2
    - setuptools <60

test:
  commands:
    - telescope --version
    - telescope -h &> /dev/null
    - telescope assign -h &> /dev/null
    - telescope resume -h &> /dev/null

about:
  home: "https://github.com/mlbendall/telescope"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: |
    Single locus resolution of Transposable ELEment expression. This is an updated release from the original code to
    fix a bug and reinstate --stranded_mode. The code for 1.0.4 is from a fork (https://github.com/hanalysis/telescope)
    of the original repo, with cherry-picked commits from the sc-remove branch of the original.
  dev_url: "https://github.com/mlbendall/telescope"

extra:
  identifiers:
    - doi:10.1101/398172
  container:
    extended-base: True
  recipe-maintainers:
    - davebx
    - hanalysis
